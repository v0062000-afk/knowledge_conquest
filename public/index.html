<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知識爭奪戰 - 多人連線版</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      background: radial-gradient(circle at top left, #16193b 0%, #0d1028 45%, #090b1d 100%);
      color: #fff;
    }
    .app { max-width: 1460px; margin: 0 auto; padding: 18px 14px 28px; }
    .title { font-size: 52px; font-weight: 900; margin: 0 0 18px; }

    .card {
      background: rgba(47, 48, 92, 0.92);
      border: 1px solid rgba(119, 132, 255, 0.35);
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(0,0,0,.22);
      overflow: hidden;
    }

    .setup-wrap { padding: 22px; margin-bottom: 18px; }
    .section-title { font-size: 22px; font-weight: 900; margin-bottom: 16px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .input, .select, .btn {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
    }

    .input, .select {
      background: #171938;
      color: #fff;
      border: 1px solid rgba(130,141,255,.35);
    }

    .btn-confirm {
      background: #4e84f3;
      color: #fff;
      cursor: pointer;
    }

    .btn-cancel {
      background: #8a8db0;
      color: #fff;
      cursor: pointer;
    }

    .label {
      font-size: 15px;
      font-weight: 800;
      color: #dfe3ff;
      margin-bottom: 10px;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .role-card {
      background: rgba(255,255,255,.04);
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 18px 14px;
      cursor: pointer;
      transition: .2s ease;
      text-align: center;
    }

    .role-card:hover {
      transform: translateY(-2px);
      border-color: rgba(117,162,255,.7);
    }

    .role-card.active {
      border-color: #5d93ff;
      box-shadow: 0 0 0 3px rgba(93,147,255,.16) inset;
    }

    .avatar {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      margin: 0 auto 10px;
      display: block;
      object-fit: cover;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
    }

    .role-name { font-size: 17px; font-weight: 900; margin-bottom: 6px; }
    .role-skill { font-size: 14px; color: #cdd4ff; font-weight: 700; line-height: 1.5; }

    .join-btn {
      background: linear-gradient(90deg, #5a8dff, #4c86f6);
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }

    .game-layout {
      display: none;
      grid-template-columns: 1.7fr 1fr;
      gap: 14px;
    }

    .game-layout.show { display: grid; }
    .left-panel-inner, .right-panel-inner { padding: 16px; }

    .sub-title { font-size: 20px; font-weight: 900; margin: 0 0 10px; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: #171938;
      border: 1px solid rgba(132,144,255,.35);
      font-size: 14px;
      font-weight: 800;
    }

    .legend {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .legend-item {
      background: #171938;
      border: 1px solid rgba(132,144,255,.28);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-color { width: 16px; height: 16px; border-radius: 4px; }

    .map-and-side {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 14px;
      margin-bottom: 14px;
    }

    .map-wrap, .side-box, .panel-box, .lobby-box {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(132,144,255,.25);
      border-radius: 20px;
      padding: 14px;
    }

    .map-grid {
      display: grid;
      gap: 12px;
      justify-content: start;
      min-height: 380px;
    }

    .tile {
      width: 92px;
      height: 92px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, #28305d 0%, #1e2445 100%);
      position: relative;
      cursor: pointer;
      transition: .15s ease;
      overflow: hidden;
      opacity: 1;
    }

    .tile.reachable {
      border-color: #1ddf7a;
      box-shadow: 0 0 0 3px rgba(29,223,122,.14) inset;
    }

    .tile.current-pos {
      border-color: #ffcf57;
      box-shadow: 0 0 0 3px rgba(255,207,87,.28) inset;
    }

    .tile.selected-preview {
      border-color: #7aa7ff;
      box-shadow: 0 0 0 3px rgba(122,167,255,.24) inset;
    }

    .tile.blocked {
      background: linear-gradient(180deg, #595969 0%, #444454 100%);
      opacity: .72;
      cursor: not-allowed;
    }

    .tile.owner-p1 { background: linear-gradient(180deg, #205c47 0%, #173d31 100%); }
    .tile.owner-p2 { background: linear-gradient(180deg, #8b6117 0%, #654611 100%); }
    .tile.owner-p3 { background: linear-gradient(180deg, #4b4ed1 0%, #34379f 100%); }
    .tile.owner-p4 { background: linear-gradient(180deg, #a33ab0 0%, #772a82 100%); }

    .tile.unavailable {
      opacity: .42;
      cursor: not-allowed;
    }

    .tile-header {
      position: absolute;
      top: 7px;
      left: 9px;
      font-size: 12px;
      font-weight: 900;
    }

    .tile-type {
      position: absolute;
      bottom: 8px;
      left: 10px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(0,0,0,.22);
      padding: 4px 8px;
      border-radius: 999px;
      max-width: calc(100% - 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-marker {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: 3px solid rgba(255,255,255,.78);
      object-fit: cover;
      background: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
    }

    .side-box h3, .panel-box h3, .lobby-box h3 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 900;
    }

    .skill-btn {
      margin-bottom: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }

    .skill-green { background: #1bb56e; }
    .skill-red { background: #e15050; }
    .skill-blue { background: #4d84f7; }
    .skill-orange { background: #f59e0b; }
    .skill-purple { background: #8b5cf6; }

    .skill-note {
      color: #d3dcff;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
    }

    .player-list {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }

    .player-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(132,144,255,.25);
      border-radius: 20px;
      padding: 14px;
    }

    .player-top {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      margin-bottom: 10px;
    }

    .player-avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
    }

    .player-name { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
    .player-role { font-size: 15px; color: #d5dcff; font-weight: 800; }
    .player-info { font-size: 15px; line-height: 1.65; color: #eef2ff; font-weight: 700; }

    .system-log {
      background: #090b17;
      border: 1px solid rgba(132,144,255,.25);
      border-radius: 18px;
      padding: 14px;
      min-height: 180px;
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-line;
      overflow-y: auto;
    }

    .mobile-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1200;
    }

    .mobile-modal.show { display: flex; }

    .mobile-sheet {
      width: 100%;
      max-width: 560px;
      background: #2f305c;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 18px 16px 20px;
      box-shadow: 0 -12px 30px rgba(0,0,0,.28);
    }

    .mobile-sheet.large {
      max-height: 88vh;
      overflow-y: auto;
    }

    .mobile-sheet-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .mobile-sheet-content {
      font-size: 16px;
      line-height: 1.7;
      color: #e8ecff;
      margin-bottom: 14px;
    }

    .mobile-sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .question-type-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(225,94,94,.14);
      color: #ffd4d4;
      border: 1px solid rgba(255,126,126,.28);
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(132,144,255,.22);
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      transition: .15s ease;
    }

    .option:hover {
      border-color: #84a5ff;
      transform: translateY(-1px);
    }

    .option.removed {
      opacity: .35;
      pointer-events: none;
    }

    .result-box {
      margin-top: 12px;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 900;
      display: none;
      line-height: 1.6;
    }

    .result-box.show { display: block; }
    .result-correct { background: rgba(27,181,110,.16); color: #c9ffe6; border: 1px solid rgba(27,181,110,.38); }
    .result-wrong { background: rgba(225,80,80,.16); color: #ffd7d7; border: 1px solid rgba(225,80,80,.35); }

    .winner-modal {
      position: fixed;
      inset: 0;
      background: rgba(3,6,18,.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .winner-modal.show { display: flex; }

    .winner-card {
      width: min(520px, 100%);
      background: linear-gradient(180deg, #2f305c 0%, #232647 100%);
      border: 1px solid rgba(132,144,255,.36);
      border-radius: 26px;
      padding: 24px;
      text-align: center;
    }

    .winner-card img {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      margin-bottom: 12px;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,.7);
      background: #fff;
    }

    .winner-big { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .winner-text { font-size: 19px; font-weight: 800; margin-bottom: 16px; color: #dfe5ff; }
    .winner-stat { font-size: 18px; font-weight: 900; margin-bottom: 18px; line-height: 1.8; }

    .hidden { display: none !important; }

    @media (max-width: 1240px) {
      .game-layout.show { grid-template-columns: 1fr; }
      .map-and-side { grid-template-columns: 1fr; }
      .role-grid { grid-template-columns: repeat(3, 1fr); }
      .title { font-size: 42px; }
    }

    @media (max-width: 768px) {
      .row, .role-grid { grid-template-columns: 1fr; }
      .tile { width: 78px; height: 78px; }
      .title { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">知識爭奪戰 - 多人連線版</div>

    <div id="setupScreen" class="card setup-wrap">
      <div class="section-title">建立 / 加入房間</div>

      <div class="row">
        <input id="roomInput" class="input" placeholder="房間號" value="123" />
        <input id="nicknameInput" class="input" placeholder="你的暱稱" value="555" />
      </div>

      <div class="row">
        <select id="mapSizeSelect" class="select">
          <option value="3">3x3</option>
          <option value="4">4x4</option>
          <option value="5">5x5</option>
        </select>

        <select id="playerCountSelect" class="select">
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人</option>
        </select>
      </div>

      <div class="label">題庫模式</div>
      <select id="modeSelect" class="select" style="margin-bottom:16px;">
        <option value="normal">普通題型</option>
        <option value="hard">困難題型</option>
        <option value="super">超級難題型</option>
        <option value="mix" selected>綜合題型</option>
      </select>

      <div class="label">選擇角色</div>
      <div id="roleGrid" class="role-grid"></div>

      <button id="joinBtn" class="btn join-btn">加入房間</button>
    </div>

    <div id="lobbyScreen" class="card setup-wrap hidden">
      <div class="section-title">房間大廳</div>
      <div class="lobby-box">
        <h3>房間資訊</h3>
        <div id="lobbyInfo" class="skill-note"></div>
        <div id="countdownBox" class="skill-note" style="margin-top:12px;"></div>
        <div style="margin-top:14px;">
          <button id="readyBtn" class="btn btn-confirm">準備完成</button>
        </div>
      </div>
    </div>

    <div id="gameScreen" class="game-layout">
      <div class="card">
        <div class="left-panel-inner">
          <div class="sub-title">遊戲地圖</div>

          <div class="chips">
            <div class="chip" id="chipRoom">房間：123</div>
            <div class="chip" id="chipMap">地圖：5x5</div>
            <div class="chip" id="chipPlayers">人數：2</div>
            <div class="chip" id="chipMode">題庫：綜合題型</div>
            <div class="chip" id="chipStatus">狀態：等待中</div>
          </div>

          <div class="legend">
            <div class="legend-item"><span class="legend-color" style="background:#1ddf7a;"></span> 綠框 - 你目前可前進</div>
            <div class="legend-item"><span class="legend-color" style="background:#ffcf57;"></span> 黃框 - 你的位置</div>
            <div class="legend-item"><span class="legend-color" style="background:#205c47;"></span> 綠底 - 玩家1占領</div>
            <div class="legend-item"><span class="legend-color" style="background:#8b6117;"></span> 金底 - 玩家2占領</div>
            <div class="legend-item"><span class="legend-color" style="background:#4b4ed1;"></span> 藍底 - 玩家3占領</div>
            <div class="legend-item"><span class="legend-color" style="background:#a33ab0;"></span> 紫底 - 玩家4占領</div>
            <div class="legend-item"><span class="legend-color" style="background:#595969;"></span> 灰底 - 答錯封鎖</div>
          </div>

          <div class="map-and-side">
            <div class="map-wrap">
              <div id="mapGrid" class="map-grid"></div>
            </div>

            <div class="side-box">
              <h3>技能 / 提示</h3>
              <div id="skillButtonsWrap"></div>
              <div id="previewContent" class="skill-note">等待遊戲開始。</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="right-panel-inner">
          <div class="sub-title">玩家資訊</div>
          <div id="playerList" class="player-list"></div>

          <div class="panel-box">
            <h3>系統訊息</h3>
            <div id="systemLog" class="system-log"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="tileModal" class="mobile-modal">
    <div class="mobile-sheet">
      <div class="mobile-sheet-title">選擇格子</div>
      <div id="tileModalContent" class="mobile-sheet-content"></div>
      <div class="mobile-sheet-actions">
        <button id="tileModalCancelBtn" class="btn btn-cancel">取消</button>
        <button id="tileModalConfirmBtn" class="btn btn-confirm">確認挑戰</button>
      </div>
    </div>
  </div>

  <div id="questionModal" class="mobile-modal">
    <div class="mobile-sheet large">
      <div class="mobile-sheet-title">題目挑戰</div>
      <div class="question-type-tag">⏳ 剩餘時間：<span id="modalTimerText">15 秒</span></div>
      <div id="modalQuestionText" class="mobile-sheet-content" style="font-size:20px;font-weight:900;margin-bottom:14px;"></div>
      <div id="questionSkillBar" style="margin-bottom:12px;"></div>
      <div id="modalOptionsWrap" class="options"></div>
      <div id="modalResultBox" class="result-box"></div>
      <div class="mobile-sheet-actions">
        <button id="modalCloseBtn" class="btn btn-cancel">關閉</button>
      </div>
    </div>
  </div>

  <div id="winnerModal" class="winner-modal">
    <div class="winner-card">
      <img id="winnerAvatar" src="" alt="winner">
      <div class="winner-big">🎉 遊戲結算</div>
      <div id="winnerText" class="winner-text"></div>
      <div id="winnerStat" class="winner-stat"></div>
      <button id="closeWinnerBtn" class="btn btn-confirm">關閉</button>
    </div>
  </div>

  <div id="freezeModal" class="winner-modal">
    <div class="winner-card" style="max-width:420px;">
      <div class="winner-big">❄️ 你目前被凍結中</div>
      <div id="freezeCountdownText" class="winner-text">5 秒</div>
    </div>
  </div>

  <script>
    const socket = io();

    const ROLE_COLORS = {
      p1: "owner-p1",
      p2: "owner-p2",
      p3: "owner-p3",
      p4: "owner-p4"
    };

    const ROLES = [
      { id: "scholar", name: "學霸", skillText: "刪 2 ×3", imageCandidates: ["static/characters/scholar.png", "static/characters/scholar.PNG"] },
      { id: "landlord", name: "霸道地主", skillText: "霸佔 ×1", imageCandidates: ["static/characters/landlord.png", "static/characters/landlord.PNG"] },
      { id: "prophet", name: "先知", skillText: "被動：顯示全部題型", imageCandidates: ["static/characters/prophet.png", "static/characters/prophet.PNG"] },
      { id: "timeMaster", name: "時間大師", skillText: "凍結全部玩家 5 秒 ×1", imageCandidates: ["static/characters/time-master.png", "static/characters/time-master.PNG", "static/characters/timeMaster.png", "static/characters/timeMaster.PNG", "static/characters/timemaster.png", "static/characters/timemaster.PNG", "static/characters/時間大師.png"] },
      { id: "bombMan", name: "炸彈怪客", skillText: "炸彈 ×1", imageCandidates: ["static/characters/bomb-man.png", "static/characters/bomb-man.PNG"] }
    ];

    const state = {
      selectedRoleId: "timeMaster",
      room: null,
      selectedTileIndex: null,
      timerInterval: null,
      countdownInterval: null,
      freezeInterval: null,
      expireAt: 0,
      activeSkillMode: null
    };

    const roleGrid = document.getElementById("roleGrid");
    const setupScreen = document.getElementById("setupScreen");
    const lobbyScreen = document.getElementById("lobbyScreen");
    const gameScreen = document.getElementById("gameScreen");
    const mapGrid = document.getElementById("mapGrid");
    const playerList = document.getElementById("playerList");
    const systemLog = document.getElementById("systemLog");
    const previewContent = document.getElementById("previewContent");
    const skillButtonsWrap = document.getElementById("skillButtonsWrap");
    const tileModal = document.getElementById("tileModal");
    const tileModalContent = document.getElementById("tileModalContent");
    const questionModal = document.getElementById("questionModal");
    const modalTimerText = document.getElementById("modalTimerText");
    const modalQuestionText = document.getElementById("modalQuestionText");
    const modalOptionsWrap = document.getElementById("modalOptionsWrap");
    const modalResultBox = document.getElementById("modalResultBox");
    const winnerModal = document.getElementById("winnerModal");
    const winnerAvatar = document.getElementById("winnerAvatar");
    const winnerText = document.getElementById("winnerText");
    const winnerStat = document.getElementById("winnerStat");
    const readyBtn = document.getElementById("readyBtn");
    const lobbyInfo = document.getElementById("lobbyInfo");
    const countdownBox = document.getElementById("countdownBox");
    const questionSkillBar = document.getElementById("questionSkillBar");
    const freezeModal = document.getElementById("freezeModal");
    const freezeCountdownText = document.getElementById("freezeCountdownText");

    function getRoleImage(role) {
      return role.imageCandidates[0];
    }

    function handleImgFallback(img) {
      try {
        const list = JSON.parse(img.dataset.fallbacks || "[]");
        let currentIndex = Number(img.dataset.index || "0");
        currentIndex += 1;
        if (currentIndex < list.length) {
          img.dataset.index = currentIndex;
          img.src = list[currentIndex];
        } else {
          img.onerror = null;
          img.src = "https://dummyimage.com/82x82/2d3566/ffffff&text=%E8%A7%92%E8%89%B2";
        }
      } catch {
        img.onerror = null;
        img.src = "https://dummyimage.com/82x82/2d3566/ffffff&text=%E8%A7%92%E8%89%B2";
      }
    }
    window.handleImgFallback = handleImgFallback;

    function getSimpleHint(type) {
      if (["國文", "歷史", "地理"].includes(type)) return "📘 人文類";
      if (["數學", "科學"].includes(type)) return "🔬 理科類";
      if (["邏輯"].includes(type)) return "🧠 推理類";
      return "❓";
    }

    function myPlayer() {
      return state.room?.players?.find((p) => p.isSelf) || null;
    }

    function getNeighbors(index, size) {
      const row = Math.floor(index / size);
      const col = index % size;
      const result = [];
      if (row > 0) result.push(index - size);
      if (row < size - 1) result.push(index + size);
      if (col > 0) result.push(index - 1);
      if (col < size - 1) result.push(index + 1);
      return result;
    }

    function movableIndexesForSelf() {
      const me = myPlayer();
      if (!me || me.ended || !state.room) return [];
      if (me.status === "凍結中") return [];
      return getNeighbors(me.position, state.room.mapSize).filter((i) => {
        const tile = state.room.board[i];
        if (!tile) return false;
        if (tile.status === "blocked") return false;
        if (tile.owner && tile.owner !== me.id) return false;
        if (tile.owner === me.id) return false;
        return true;
      });
    }

    function renderRoles() {
      roleGrid.innerHTML = "";
      ROLES.forEach((role) => {
        const div = document.createElement("div");
        div.className = "role-card" + (state.selectedRoleId === role.id ? " active" : "");
        const fallbackJson = JSON.stringify(role.imageCandidates).replace(/"/g, "&quot;");
        div.innerHTML = `
          <img class="avatar" src="${getRoleImage(role)}" alt="${role.name}" data-fallbacks="${fallbackJson}" data-index="0" onerror="handleImgFallback(this)">
          <div class="role-name">${role.name}</div>
          <div class="role-skill">${role.skillText}</div>
        `;
        div.onclick = () => {
          state.selectedRoleId = role.id;
          renderRoles();
        };
        roleGrid.appendChild(div);
      });
    }

    function renderLobby() {
      if (!state.room) return;
      const me = myPlayer();
      const owner = state.room.players.find((p) => p.id === state.room.ownerId);
      lobbyInfo.innerHTML = `
        房號：${state.room.roomNo}<br>
        房主：${owner ? owner.nickname : "-"}<br>
        目前人數：${state.room.players.length} / ${state.room.playerLimit}<br>
        你的狀態：${me?.ready ? "已準備" : "未準備"}
      `;

      readyBtn.textContent = me?.ready ? "取消準備" : "準備完成";

      clearInterval(state.countdownInterval);
      countdownBox.textContent = "";

      if (state.room.countdownEndsAt) {
        const updateCountdown = () => {
          const sec = Math.max(0, Math.ceil((state.room.countdownEndsAt - Date.now()) / 1000));
          countdownBox.textContent = `全部玩家已準備，${sec} 秒後開始`;
        };
        updateCountdown();
        state.countdownInterval = setInterval(updateCountdown, 250);
      }
    }

    function renderPlayers() {
      playerList.innerHTML = "";
      (state.room?.players || []).forEach((player, idx) => {
        const role = ROLES.find((r) => r.id === player.roleId) || ROLES[0];
        const fallbackJson = JSON.stringify(role.imageCandidates).replace(/"/g, "&quot;");
        const extra = player.isSelf ? "（你）" : "";
        const ownerMark = state.room.ownerId === player.id ? " 👑房主" : "";
        const card = document.createElement("div");
        card.className = "player-card";
        card.innerHTML = `
          <div class="player-top">
            <img class="player-avatar" src="${getRoleImage(role)}" alt="${player.nickname}" data-fallbacks="${fallbackJson}" data-index="0" onerror="handleImgFallback(this)">
            <div>
              <div class="player-name">${player.nickname}${extra}${ownerMark}</div>
              <div class="player-role">${player.roleName}</div>
            </div>
          </div>
          <div class="player-info">
            系統編號：玩家${idx + 1}<br>
            位置：(${Math.floor(player.position / state.room.mapSize)}, ${player.position % state.room.mapSize})<br>
            佔領格數：${player.score}<br>
            狀態：${player.status}<br>
            準備：${player.ready ? "是" : "否"}
          </div>
        `;
        playerList.appendChild(card);
      });
    }

    function playersAtTile(index) {
      return (state.room?.players || []).filter((p) => p.position === index);
    }

    function renderMap() {
      if (!state.room?.started) return;
      mapGrid.innerHTML = "";
      mapGrid.style.gridTemplateColumns = `repeat(${state.room.mapSize}, 92px)`;

      const me = myPlayer();
      const movable = movableIndexesForSelf();

      state.room.board.forEach((tile) => {
        const div = document.createElement("div");
        let cls = "tile";
        if (tile.owner && ROLE_COLORS[tile.owner]) cls += ` ${ROLE_COLORS[tile.owner]}`;
        if (tile.status === "blocked") cls += " blocked";
        if (me && me.position === tile.index) cls += " current-pos";
        if (movable.includes(tile.index)) cls += " reachable";
        if (state.selectedTileIndex === tile.index) cls += " selected-preview";

        const available =
          movable.includes(tile.index) ||
          (me && me.position === tile.index) ||
          tile.status === "blocked" ||
          tile.owner === me?.id;

        if (!available && tile.status !== "blocked") cls += " unavailable";

        div.className = cls;
        div.innerHTML = `
          <div class="tile-header">#${tile.index + 1}</div>
          <div class="tile-type">${tile.visibleType === "?" ? "?" : tile.visibleType}</div>
        `;

        playersAtTile(tile.index).forEach((player, idx) => {
          const role = ROLES.find((r) => r.id === player.roleId) || ROLES[0];
          const fallbackJson = JSON.stringify(role.imageCandidates).replace(/"/g, "&quot;");
          const marker = document.createElement("img");
          marker.className = "player-marker";
          marker.src = getRoleImage(role);
          marker.alt = player.nickname;
          marker.dataset.fallbacks = fallbackJson;
          marker.dataset.index = "0";
          marker.onerror = function () { handleImgFallback(this); };

          const pos = [
            { top: "22px", left: "14px" },
            { top: "22px", right: "14px" },
            { bottom: "30px", left: "14px" },
            { bottom: "30px", right: "14px" }
          ][idx] || { top: "22px", left: "14px" };

          Object.assign(marker.style, pos);
          div.appendChild(marker);
        });

        div.onclick = () => onTileClick(tile.index);
        mapGrid.appendChild(div);
      });
    }

    function renderFreezeModal() {
      const me = myPlayer();
      clearInterval(state.freezeInterval);

      if (!me || me.status !== "凍結中" || !me.frozenUntil || Date.now() >= me.frozenUntil) {
        freezeModal.classList.remove("show");
        return;
      }

      const tick = () => {
        const currentMe = myPlayer();
        const left = Math.max(0, Math.ceil(((currentMe?.frozenUntil || 0) - Date.now()) / 1000));
        freezeCountdownText.textContent = `${left} 秒`;

        if (left <= 0) {
          clearInterval(state.freezeInterval);
          freezeModal.classList.remove("show");
        }
      };

      freezeModal.classList.add("show");
      tick();
      state.freezeInterval = setInterval(tick, 250);
    }

    function renderQuestionSkillBar() {
      questionSkillBar.innerHTML = "";
      const me = myPlayer();
      if (!me) return;

      if (me.roleId === "scholar" && me.counts?.delete2 > 0) {
        const btn = document.createElement("button");
        btn.className = "btn skill-btn skill-green";
        btn.textContent = `✂️ 刪2選項 (${me.counts.delete2})`;
        btn.onclick = () => {
          socket.emit("use_skill", { skill: "delete2" });
        };
        questionSkillBar.appendChild(btn);
      }
    }

    function renderSkillArea() {
      skillButtonsWrap.innerHTML = "";
      const me = myPlayer();

      if (!me) {
        previewContent.textContent = "等待加入房間。";
        return;
      }

      if (!state.room?.started) {
        previewContent.textContent = "等待遊戲開始。";
        return;
      }

      if (me.ended) {
        previewContent.textContent = "你已結束，等待其他玩家結算。";
      } else if (me.status === "凍結中") {
        previewContent.textContent = "你目前被凍結中，暫時不能行動。";
      } else if (state.activeSkillMode === "bomb") {
        previewContent.textContent = "請點選任意地圖格子，將它炸成灰色格。";
      } else if (state.activeSkillMode === "reset") {
        previewContent.textContent = "請點選鄰近的灰色格子進行重置。";
      } else if (state.activeSkillMode === "occupy") {
        previewContent.textContent = "請點選鄰近任一格，可直接搶灰格或其他玩家地盤。";
      } else {
        previewContent.textContent = "請點選你目前可走的鄰近格。";
      }

      if (me.roleId === "prophet") {
        const tag = document.createElement("div");
        tag.className = "btn skill-btn skill-purple";
        tag.style.cursor = "default";
        tag.textContent = "👁️ 先知被動：已顯示全部題型";
        skillButtonsWrap.appendChild(tag);
      }

      if (me.counts?.delete2 > 0) {
        const btn = document.createElement("button");
        btn.className = "btn skill-btn skill-green";
        btn.textContent = `✂️ 刪2選項 (${me.counts.delete2})`;
        btn.onclick = () => socket.emit("use_skill", { skill: "delete2" });
        skillButtonsWrap.appendChild(btn);
      }

      if (me.counts?.occupy > 0) {
        const btn = document.createElement("button");
        btn.className = "btn skill-btn skill-orange";
        btn.textContent = `🏰 霸佔 (${me.counts.occupy})`;
        btn.onclick = () => {
          state.activeSkillMode = "occupy";
          previewContent.textContent = "請點選鄰近任一格，可直接搶灰格或其他玩家地盤。";
        };
        skillButtonsWrap.appendChild(btn);
      }

      if (me.counts?.freeze > 0) {
        const btn = document.createElement("button");
        btn.className = "btn skill-btn skill-blue";
        btn.textContent = `⏱️ 凍結全部玩家 (${me.counts.freeze})`;
        btn.onclick = () => {
          socket.emit("use_skill", { skill: "freeze" });
        };
        skillButtonsWrap.appendChild(btn);
      }

      if (me.counts?.bomb > 0) {
        const btn = document.createElement("button");
        btn.className = "btn skill-btn skill-red";
        btn.textContent = `💣 炸彈 (${me.counts.bomb})`;
        btn.onclick = () => {
          state.activeSkillMode = "bomb";
          previewContent.textContent = "請點選任意地圖格子，將它炸成灰色格。";
        };
        skillButtonsWrap.appendChild(btn);
      }

      if (me.counts?.reset > 0) {
        const btn = document.createElement("button");
        btn.className = "btn skill-btn skill-red";
        btn.textContent = `🔄 重置灰格 (${me.counts.reset})`;
        btn.onclick = () => {
          state.activeSkillMode = "reset";
          previewContent.textContent = "請點選鄰近的灰色格子進行重置。";
        };
        skillButtonsWrap.appendChild(btn);
      }
    }

    function renderRoom() {
      if (!state.room) return;

      const modeMap = {
        normal: "普通題型",
        hard: "困難題型",
        super: "超級難題型",
        mix: "綜合題型"
      };

      document.getElementById("chipRoom").textContent = `房間：${state.room.roomNo}`;
      document.getElementById("chipMap").textContent = `地圖：${state.room.mapSize}x${state.room.mapSize}`;
      document.getElementById("chipPlayers").textContent = `人數：${state.room.players.length}/${state.room.playerLimit}`;
      document.getElementById("chipMode").textContent = `題庫：${modeMap[state.room.mode] || "綜合題型"}`;
      document.getElementById("chipStatus").textContent = `狀態：${state.room.finished ? "已結算" : state.room.started ? "進行中" : "等待開始"}`;

      renderLobby();
      renderPlayers();

      if (state.room.started) {
        renderMap();
        renderSkillArea();
      }

      systemLog.textContent = (state.room.logs || []).map((line) => `- ${line}`).join("\n");
      systemLog.scrollTop = systemLog.scrollHeight;
    }

    function onTileClick(index) {
      const me = myPlayer();
      if (!state.room?.started || state.room?.finished) return;
      if (!me || me.ended) return alert("你已經結束");
      if (me.status === "凍結中") return alert("你目前被凍結中");

      const tile = state.room.board[index];
      const movable = movableIndexesForSelf();
      const neighborIndexes = getNeighbors(me.position, state.room.mapSize);

      if (state.activeSkillMode === "bomb") {
        socket.emit("use_skill", { skill: "bomb", targetTileIndex: index });
        state.activeSkillMode = null;
        previewContent.textContent = "請點選你目前可走的鄰近格。";
        return;
      }

      if (state.activeSkillMode === "reset") {
        if (!neighborIndexes.includes(index) || tile.status !== "blocked") {
          return alert("只能點選鄰近的灰色格子");
        }
        socket.emit("use_skill", { skill: "reset", targetTileIndex: index });
        state.activeSkillMode = null;
        previewContent.textContent = "請點選你目前可走的鄰近格。";
        return;
      }

      if (state.activeSkillMode === "occupy") {
        if (!neighborIndexes.includes(index)) {
          return alert("只能點選鄰近格子");
        }
        if (index === me.position) {
          return alert("不能霸佔自己目前所在格");
        }
        socket.emit("use_skill", { skill: "occupy", targetTileIndex: index });
        state.activeSkillMode = null;
        previewContent.textContent = "請點選你目前可走的鄰近格。";
        return;
      }

      const canSelect = movable.includes(index);
      if (!canSelect) {
        alert("只能選鄰近可走格");
        return;
      }

      state.selectedTileIndex = index;

      const hintText = me.roleId === "prophet"
        ? tile.type
        : getSimpleHint(tile.type);

      tileModalContent.innerHTML = `
        格子編號：#${tile.index + 1}<br>
        題型提示：${hintText}<br>
        目前占領：${tile.owner || "無"}<br>
        狀態：${tile.status === "blocked" ? "灰色封鎖" : "可挑戰"}
      `;

      tileModal.classList.add("show");
      renderMap();
    }

    function startTimer(expireAt) {
      clearInterval(state.timerInterval);
      state.expireAt = expireAt;

      const tick = () => {
        const left = Math.max(0, Math.ceil((state.expireAt - Date.now()) / 1000));
        modalTimerText.textContent = `${left} 秒`;
      };

      tick();
      state.timerInterval = setInterval(tick, 250);
    }

    document.getElementById("joinBtn").addEventListener("click", () => {
      socket.emit("join_room", {
        roomNo: document.getElementById("roomInput").value.trim() || "123",
        nickname: document.getElementById("nicknameInput").value.trim() || "玩家",
        roleId: state.selectedRoleId,
        mapSize: Number(document.getElementById("mapSizeSelect").value),
        playerLimit: Number(document.getElementById("playerCountSelect").value),
        mode: document.getElementById("modeSelect").value
      });
    });

    readyBtn.addEventListener("click", () => {
      socket.emit("toggle_ready");
    });

    document.getElementById("tileModalCancelBtn").addEventListener("click", () => {
      state.selectedTileIndex = null;
      tileModal.classList.remove("show");
      if (state.room?.started) renderMap();
    });

    document.getElementById("tileModalConfirmBtn").addEventListener("click", () => {
      if (state.selectedTileIndex == null) return;
      socket.emit("start_question", { tileIndex: state.selectedTileIndex });
      tileModal.classList.remove("show");
    });

    document.getElementById("modalCloseBtn").addEventListener("click", () => {
      questionModal.classList.remove("show");
    });

    document.getElementById("closeWinnerBtn").addEventListener("click", () => {
      winnerModal.classList.remove("show");
    });

    socket.on("join_error", (msg) => alert(msg));
    socket.on("action_error", (msg) => alert(msg));

    socket.on("room_state", (room) => {
      state.room = room;

      setupScreen.classList.toggle("hidden", !!room);
      lobbyScreen.classList.toggle("hidden", !room || room.started);
      gameScreen.classList.toggle("show", !!room && room.started);

      renderRoom();
      renderFreezeModal();

      if (room.finished) {
        const sorted = [...room.players].sort((a, b) => b.score - a.score);
        const winner = sorted[0];
        const ties = sorted.filter((p) => p.score === winner.score);
        const role = ROLES.find((r) => r.id === winner.roleId) || ROLES[0];

        winnerAvatar.src = getRoleImage(role);
        winnerAvatar.dataset.fallbacks = JSON.stringify(role.imageCandidates);
        winnerAvatar.dataset.index = "0";
        winnerAvatar.onerror = function () { handleImgFallback(this); };

        winnerText.textContent = ties.length > 1
          ? `平手：${ties.map((t) => t.nickname).join("、")}`
          : `${winner.nickname} 獲勝`;

        winnerStat.innerHTML = sorted.map((p, i) => `${i + 1}. ${p.nickname}：${p.score} 格`).join("<br>");
        winnerModal.classList.add("show");
      }
    });

    socket.on("question_started", ({ question, expireAt, removedOptions }) => {
      modalQuestionText.textContent = question.q;
      modalOptionsWrap.innerHTML = "";
      modalResultBox.className = "result-box";
      modalResultBox.textContent = "";
      startTimer(expireAt);
      renderQuestionSkillBar();

      question.options.forEach((opt, idx) => {
        const option = document.createElement("div");
        option.className = "option";
        if ((removedOptions || []).includes(idx)) {
          option.classList.add("removed");
          option.textContent = `${String.fromCharCode(65 + idx)}. （已刪除）`;
        } else {
          option.textContent = `${String.fromCharCode(65 + idx)}. ${opt}`;
          option.onclick = () => {
            socket.emit("answer_question", { optionIndex: idx });
          };
        }
        modalOptionsWrap.appendChild(option);
      });

      questionModal.classList.add("show");
    });

    socket.on("question_options_removed", ({ removedOptions }) => {
      [...modalOptionsWrap.children].forEach((el, idx) => {
        if (removedOptions.includes(idx)) {
          el.classList.add("removed");
          el.textContent = `${String.fromCharCode(65 + idx)}. （已刪除）`;
          el.onclick = null;
        }
      });
    });

    socket.on("question_result", (result) => {
      clearInterval(state.timerInterval);

      modalResultBox.className = `result-box ${result.correct ? "result-correct" : "result-wrong"} show`;
      modalResultBox.textContent = result.correct
        ? `答對了！${result.explain}`
        : `${result.timeout ? "時間到" : "答錯了"}。正確答案：${String.fromCharCode(65 + result.answer)}。${result.explain}`;

      setTimeout(() => {
        questionModal.classList.remove("show");
        modalResultBox.className = "result-box";
        modalResultBox.textContent = "";
        questionSkillBar.innerHTML = "";
        state.selectedTileIndex = null;
      }, 900);
    });

    renderRoles();
  </script>
</body>
</html>
