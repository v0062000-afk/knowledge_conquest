<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>知識爭奪戰</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #18212f;
            --sub: #667085;
            --line: #dde3ec;
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #059669;
            --gray: #9aa4b2;
            --shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f8fbff 0%, #eef3f9 100%);
            color: var(--text);
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px;
        }

        .title-wrap {
            margin-bottom: 12px;
        }

        .title {
            margin: 0;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .subtitle {
            margin-top: 6px;
            color: var(--sub);
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.35fr 0.9fr;
            gap: 14px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 14px;
        }

        .section-title {
            margin: 0 0 10px 0;
            font-size: 18px;
            font-weight: 800;
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .full {
            grid-column: 1 / -1;
        }

        input, select, button {
            width: 100%;
            border-radius: 14px;
            border: 1px solid var(--line);
            padding: 12px 14px;
            font-size: 16px;
        }

        input, select {
            background: #fff;
            color: var(--text);
        }

        button {
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.08s ease, opacity 0.15s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-dark {
            background: #111827;
            color: #fff;
        }

        .btn-gray {
            background: #6b7280;
            color: #fff;
        }

        .btn-gold {
            background: #d97706;
            color: #fff;
        }

        .btn-green {
            background: #059669;
            color: #fff;
        }

        .btn-red {
            background: #dc2626;
            color: #fff;
        }

        .tips {
            margin-top: 10px;
            font-size: 13px;
            color: var(--sub);
            line-height: 1.5;
        }

        .info-strip {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            background: #f7faff;
            border: 1px solid #dbe7ff;
            color: #36538a;
            font-size: 14px;
        }

        .board-wrap {
            margin-top: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        #board {
            display: grid;
            gap: 8px;
            justify-content: start;
            width: max-content;
            min-width: 100%;
        }

        .cell {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            border: 2px solid #d8e0ea;
            background: #fff;
            color: var(--text);
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6px;
            white-space: pre-line;
            user-select: none;
        }

        .cell.hidden {
            background: #ffffff;
        }

        .cell.blocked {
            background: #a7afb9;
            color: #fff;
            border-color: #a7afb9;
        }

        .cell.owned {
            color: #fff;
            border-color: transparent;
        }

        .my-pos {
            outline: 4px solid #f59e0b;
            outline-offset: 2px;
        }

        .adjacent {
            box-shadow: inset 0 0 0 3px #10b981;
        }

        .legend {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--sub);
            background: #f8fafc;
            border: 1px solid #ecf0f5;
            border-radius: 999px;
            padding: 7px 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .panel-box {
            margin-top: 12px;
            border: 1px solid #e7edf5;
            border-radius: 16px;
            padding: 12px;
            background: #fff;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .small {
            color: var(--sub);
            font-size: 13px;
            line-height: 1.5;
        }

        .skill-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .skill-btn {
            width: auto;
            min-width: 140px;
        }

        .question-box,
        .preview-box,
        .result-box {
            display: none;
        }

        .question-title {
            font-weight: 800;
            line-height: 1.6;
        }

        .timer-pill {
            display: inline-block;
            margin-top: 10px;
            background: #fff5f5;
            color: var(--danger);
            border: 1px solid #ffd0d0;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 14px;
        }

        .option-list {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }

        .option-btn {
            text-align: left;
            background: var(--primary);
            color: #fff;
        }

        .players-list {
            display: grid;
            gap: 10px;
        }

        .player-card {
            border: 1px solid #e8edf3;
            border-radius: 18px;
            padding: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
        }

        .player-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #edf2f7;
            background: #f8fafc;
            flex-shrink: 0;
        }

        .player-name {
            font-size: 16px;
            font-weight: 800;
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 999px;
            background: #eef2ff;
            color: #4338ca;
            margin-left: 6px;
        }

        .player-meta {
            display: grid;
            gap: 4px;
            font-size: 13px;
            color: #475467;
        }

        .skills-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .skill-chip {
            font-size: 12px;
            padding: 6px 8px;
            border-radius: 999px;
            background: #f5f7fb;
            border: 1px solid #e3e9f2;
            color: #344054;
        }

        .log-box {
            max-height: 300px;
            overflow-y: auto;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 16px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.55;
        }

        .room-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .room-chip {
            padding: 7px 10px;
            border-radius: 999px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            font-size: 12px;
            color: #334155;
            font-weight: 700;
        }

        .result-box {
            background: #ecfeff;
            border: 1px solid #c9f3f9;
        }

        .danger {
            color: var(--danger);
            font-weight: 800;
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 26px;
            }
        }

        @media (max-width: 640px) {
            .app {
                padding: 10px;
            }

            .card {
                border-radius: 16px;
                padding: 12px;
            }

            .setup-grid {
                grid-template-columns: 1fr;
            }

            .cell {
                width: 60px;
                height: 60px;
                border-radius: 14px;
                font-size: 12px;
            }

            .avatar {
                width: 42px;
                height: 42px;
                font-size: 22px;
                border-radius: 14px;
            }

            .skill-btn {
                min-width: auto;
                width: 100%;
            }

            .player-top {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="title-wrap">
        <h1 class="title">知識爭奪戰</h1>
        <div class="subtitle">角色頭像版｜手機優化版｜技能圖示版</div>
    </div>

    <div class="layout">
        <div class="card">
            <div class="section-title">建立 / 加入房間</div>

            <div class="setup-grid">
                <input id="roomInput" class="full" placeholder="輸入房間號，例如 123" />

                <select id="boardSize">
                    <option value="3">地圖：3 x 3</option>
                    <option value="4">地圖：4 x 4</option>
                    <option value="5">地圖：5 x 5</option>
                    <option value="6">地圖：6 x 6</option>
                </select>

                <select id="maxPlayers">
                    <option value="2">玩家數：2 人</option>
                    <option value="3">玩家數：3 人</option>
                    <option value="4">玩家數：4 人</option>
                </select>

                <select id="characterSelect" class="full">
                    <option value="slow">🐢 慢速人｜每題 +5 秒</option>
                    <option value="scholar">🎓 學霸｜刪除兩個選項 3 次</option>
                    <option value="landlord">👑 霸道地主｜強制霸佔 1 格</option>
                    <option value="seer">🔮 先知｜可看所有格子的題型</option>
                </select>

                <button id="joinBtn" class="btn-primary">加入房間</button>
                <button id="startGameBtn" class="btn-dark">房主開始遊戲</button>
            </div>

            <div class="tips">
                角色說明：慢速人每題自動延長 5 秒；學霸可刪掉兩個錯誤選項 3 次；
                霸道地主可直接霸佔一格鄰近隱藏格；先知可直接看到地圖上所有格子的題型。
                所有人都有 1 次重置灰色格的基本技能。
            </div>

            <div id="roomBadges" class="room-badges"></div>

            <div class="legend">
                <div class="legend-item"><span class="dot" style="background:#e74c3c;"></span> 玩家1</div>
                <div class="legend-item"><span class="dot" style="background:#3498db;"></span> 玩家2</div>
                <div class="legend-item"><span class="dot" style="background:#2ecc71;"></span> 玩家3</div>
                <div class="legend-item"><span class="dot" style="background:#f1c40f;"></span> 玩家4</div>
                <div class="legend-item"><span class="dot" style="background:#a7afb9;"></span> 灰色格</div>
                <div class="legend-item"><span class="dot" style="background:#f59e0b;"></span> 你的位置</div>
            </div>

            <div class="board-wrap">
                <div id="board"></div>
            </div>

            <div id="previewBox" class="panel-box preview-box">
                <div class="panel-title">👀 格子預覽</div>
                <div><strong>題型：</strong><span id="previewType"></span></div>
                <div class="small">確認作答後，才會看到題目內容。</div>
                <div class="skill-row">
                    <button id="startAnswerBtn" class="btn-primary skill-btn">📝 確認作答</button>
                    <button id="forceOccupyBtn" class="btn-gold skill-btn">👑 直接霸佔</button>
                    <button id="cancelPreviewBtn" class="btn-gray skill-btn">取消</button>
                </div>
            </div>

            <div id="questionBox" class="panel-box question-box">
                <div class="panel-title">❓ 題目挑戰</div>
                <div><strong>題型：</strong><span id="qType"></span></div>
                <div class="question-title" style="margin-top:8px;"><span id="qText"></span></div>
                <div class="timer-pill">⏳ 剩餘時間：<span id="timerText">15</span> 秒</div>

                <div class="skill-row">
                    <button id="removeTwoBtn" class="btn-green skill-btn">✂️ 刪除兩個選項</button>
                </div>

                <div id="optionsArea" class="option-list"></div>
            </div>

            <div id="resultBox" class="panel-box result-box"></div>
        </div>

        <div class="card">
            <div class="section-title">玩家資訊</div>
            <div id="playersPanel" class="players-list"></div>

            <div class="panel-box">
                <div class="panel-title">🧱 基本技能：重置灰色格</div>
                <div class="small">先點一個鄰近灰色格，再按下面按鈕。</div>
                <div class="skill-row">
                    <button id="resetBlockBtn" class="btn-red skill-btn">🔄 重置灰色格</button>
                </div>
                <div id="resetTargetText" class="small">尚未選擇灰色格</div>
            </div>

            <div class="panel-box">
                <div class="panel-title">📢 系統訊息</div>
                <div id="logBox" class="log-box"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const socket = io();

    let mySid = null;
    let roomId = "";
    let roomState = null;
    let previewTarget = null;
    let questionTarget = null;
    let selectedBlockedTarget = null;
    let localTimer = null;

    const CHARACTER_AVATARS = {
        slow: "🐢",
        scholar: "🎓",
        landlord: "👑",
        seer: "🔮"
    };

    const CHARACTER_SKILL_TEXT = {
        slow: "⏳ 每題 +5 秒",
        scholar: "✂️ 刪2 ×3",
        landlord: "👑 霸佔 ×1",
        seer: "👀 顯示題型"
    };

    const roomInput = document.getElementById("roomInput");
    const boardSize = document.getElementById("boardSize");
    const maxPlayers = document.getElementById("maxPlayers");
    const characterSelect = document.getElementById("characterSelect");
    const joinBtn = document.getElementById("joinBtn");
    const startGameBtn = document.getElementById("startGameBtn");
    const board = document.getElementById("board");
    const playersPanel = document.getElementById("playersPanel");
    const logBox = document.getElementById("logBox");
    const previewBox = document.getElementById("previewBox");
    const previewType = document.getElementById("previewType");
    const startAnswerBtn = document.getElementById("startAnswerBtn");
    const forceOccupyBtn = document.getElementById("forceOccupyBtn");
    const cancelPreviewBtn = document.getElementById("cancelPreviewBtn");
    const questionBox = document.getElementById("questionBox");
    const qType = document.getElementById("qType");
    const qText = document.getElementById("qText");
    const optionsArea = document.getElementById("optionsArea");
    const timerText = document.getElementById("timerText");
    const removeTwoBtn = document.getElementById("removeTwoBtn");
    const resetBlockBtn = document.getElementById("resetBlockBtn");
    const resetTargetText = document.getElementById("resetTargetText");
    const resultBox = document.getElementById("resultBox");
    const roomBadges = document.getElementById("roomBadges");

    function addLog(msg) {
        const div = document.createElement("div");
        div.textContent = "• " + msg;
        logBox.prepend(div);
    }

    function getMyPlayer() {
        if (!roomState || !roomState.players || !mySid) return null;
        return roomState.players[mySid] || null;
    }

    function isAdjacent(myPos, x, y) {
        return Math.abs(myPos[0] - x) + Math.abs(myPos[1] - y) === 1;
    }

    function hidePreview() {
        previewBox.style.display = "none";
        previewTarget = null;
    }

    function hideQuestion() {
        questionBox.style.display = "none";
        questionTarget = null;
        if (localTimer) {
            clearInterval(localTimer);
            localTimer = null;
        }
    }

    function renderRoomBadges() {
        roomBadges.innerHTML = "";
        if (!roomState) return;

        const chips = [
            "房間：" + roomState.room,
            "地圖：" + roomState.board_size + "x" + roomState.board_size,
            "玩家上限：" + roomState.max_players + " 人",
            roomState.started ? "狀態：進行中" : "狀態：等待開始"
        ];

        chips.forEach(function (text) {
            const div = document.createElement("div");
            div.className = "room-chip";
            div.textContent = text;
            roomBadges.appendChild(div);
        });
    }

    function renderPlayers() {
        if (!roomState) return;
        playersPanel.innerHTML = "";

        Object.entries(roomState.players).forEach(function ([sid, player]) {
            const div = document.createElement("div");
            div.className = "player-card";

            const meText = sid === mySid ? "（你）" : "";
            const statusText = player.finished ? "已結束" : "進行中";
            const hostText = sid === roomState.host_id ? "<span class='badge'>房主</span>" : "";
            const avatar = CHARACTER_AVATARS[player.character] || "🙂";

            div.innerHTML =
                "<div class='player-top'>" +
                    "<div class='avatar'>" + avatar + "</div>" +
                    "<div>" +
                        "<div class='player-name'>" + player.name + meText + hostText + "</div>" +
                        "<div class='small'>" + player.character_name + "</div>" +
                    "</div>" +
                "</div>" +
                "<div class='player-meta'>" +
                    "<div>位置：(" + player.pos[0] + ", " + player.pos[1] + ")</div>" +
                    "<div>佔領格數：" + player.occupied_count + "</div>" +
                    "<div>狀態：" + statusText + "</div>" +
                "</div>" +
                "<div class='skills-inline'>" +
                    "<div class='skill-chip'>" + CHARACTER_SKILL_TEXT[player.character] + "</div>" +
                    "<div class='skill-chip'>🔄 重置：" + player.skills.reset_block + "</div>" +
                    "<div class='skill-chip'>✂️ 刪2：" + player.skills.remove_two + "</div>" +
                    "<div class='skill-chip'>👑 霸佔：" + player.skills.force_occupy + "</div>" +
                "</div>";

            playersPanel.appendChild(div);
        });
    }

    function renderBoard() {
        board.innerHTML = "";
        if (!roomState) return;

        const size = roomState.board_size;
        board.style.gridTemplateColumns = "repeat(" + size + ", 70px)";
        const myPlayer = getMyPlayer();

        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                const cell = roomState.grid[i][j];
                const btn = document.createElement("button");
                btn.className = "cell " + cell.status;

                if (cell.status === "hidden") {
                    btn.textContent = cell.type ? cell.type : "?";
                } else if (cell.status === "blocked") {
                    btn.textContent = "X";
                } else if (cell.status === "owned") {
                    const ownerPlayer = roomState.players[cell.owner];
                    btn.textContent = ownerPlayer ? ownerPlayer.name.replace("玩家", "P") : "✔";
                    btn.style.background = ownerPlayer ? ownerPlayer.color : "#777";
                }

                if (myPlayer) {
                    if (myPlayer.pos[0] === i && myPlayer.pos[1] === j) {
                        btn.classList.add("my-pos");
                    }
                    if (roomState.started && isAdjacent(myPlayer.pos, i, j) && cell.status === "hidden") {
                        btn.classList.add("adjacent");
                    }
                }

                btn.onclick = function () {
                    handleCellClick(i, j, cell);
                };

                board.appendChild(btn);
            }
        }
    }

    function handleCellClick(x, y, cell) {
        const myPlayer = getMyPlayer();
        if (!myPlayer) return;

        if (!roomState.started) {
            addLog("遊戲尚未開始。");
            return;
        }

        if (myPlayer.finished) {
            addLog("你已結束，不能再操作。");
            return;
        }

        if (questionTarget) {
            addLog("你目前有進行中的題目。");
            return;
        }

        if (cell.status === "blocked" && isAdjacent(myPlayer.pos, x, y)) {
            selectedBlockedTarget = { x: x, y: y };
            resetTargetText.textContent = "已選擇灰色格：(" + x + ", " + y + ")";
            return;
        }

        if (cell.status !== "hidden") {
            addLog("這格目前不能挑戰。");
            return;
        }

        socket.emit("preview_cell", { room: roomId, x: x, y: y });
    }

    function startLocalCountdown(seconds) {
        let remain = seconds;
        timerText.textContent = remain;
        if (localTimer) clearInterval(localTimer);

        localTimer = setInterval(function () {
            remain -= 1;
            timerText.textContent = remain;
            if (remain <= 0) {
                clearInterval(localTimer);
                localTimer = null;
            }
        }, 1000);
    }

    function renderOptions(options) {
        optionsArea.innerHTML = "";
        options.forEach(function (opt) {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.textContent = opt;
            btn.onclick = function () {
                socket.emit("submit_answer", { room: roomId, answer: opt });
            };
            optionsArea.appendChild(btn);
        });
    }

    joinBtn.onclick = function () {
        roomId = roomInput.value.trim();
        if (!roomId) {
            addLog("請輸入房間號。");
            return;
        }

        socket.emit("join", {
            room: roomId,
            board_size: parseInt(boardSize.value),
            max_players: parseInt(maxPlayers.value),
            character: characterSelect.value
        });
    };

    startGameBtn.onclick = function () {
        socket.emit("start_game", { room: roomId });
    };

    startAnswerBtn.onclick = function () {
        if (!previewTarget) return;
        socket.emit("start_answer", {
            room: roomId,
            x: previewTarget.x,
            y: previewTarget.y
        });
        hidePreview();
    };

    forceOccupyBtn.onclick = function () {
        if (!previewTarget) return;
        socket.emit("use_force_occupy", {
            room: roomId,
            x: previewTarget.x,
            y: previewTarget.y
        });
        hidePreview();
    };

    cancelPreviewBtn.onclick = function () {
        hidePreview();
    };

    removeTwoBtn.onclick = function () {
        socket.emit("use_remove_two", { room: roomId });
    };

    resetBlockBtn.onclick = function () {
        if (!selectedBlockedTarget) {
            addLog("請先點選一個鄰近灰格。");
            return;
        }

        socket.emit("use_reset_block", {
            room: roomId,
            x: selectedBlockedTarget.x,
            y: selectedBlockedTarget.y
        });

        selectedBlockedTarget = null;
        resetTargetText.textContent = "尚未選擇灰色格";
    };

    socket.on("joined", function (data) {
        mySid = data.sid;
        addLog("成功加入房間：" + data.room);
    });

    socket.on("room_state", function (data) {
        roomState = data;
        renderRoomBadges();
        renderPlayers();
        renderBoard();

        const me = getMyPlayer();
        if (me && me.character !== "landlord") {
            forceOccupyBtn.style.display = "none";
        } else {
            forceOccupyBtn.style.display = "inline-block";
        }

        if (roomState.host_id === mySid) {
            startGameBtn.style.display = "inline-block";
        } else {
            startGameBtn.style.display = "none";
        }
    });

    socket.on("cell_preview", function (data) {
        previewTarget = { x: data.x, y: data.y };
        previewType.textContent = data.type + "（座標：" + data.x + ", " + data.y + "）";
        previewBox.style.display = "block";
    });

    socket.on("question_started", function (data) {
        questionTarget = { x: data.x, y: data.y };
        qType.textContent = data.type;
        qText.textContent = data.q;
        questionBox.style.display = "block";
        renderOptions(data.options);
        startLocalCountdown(data.seconds);
    });

    socket.on("options_reduced", function (data) {
        renderOptions(data.options);
        addLog("已使用 ✂️ 刪除兩個選項。");
    });

    socket.on("question_timeout", function () {
        hideQuestion();
        addLog("你超時了，該格已變灰。");
    });

    socket.on("self_message", function (data) {
        addLog(data.msg);
        if (
            data.msg.indexOf("答對") !== -1 ||
            data.msg.indexOf("答錯") !== -1 ||
            data.msg.indexOf("超時") !== -1
        ) {
            hideQuestion();
        }
    });

    socket.on("system_message", function (data) {
        addLog(data.msg);
    });

    socket.on("game_over", function (data) {
        resultBox.style.display = "block";
        let html = "<h3>🏆 遊戲結束</h3>";
        html += "<div><strong>" + data.winner_text + "</strong></div><ol>";
        data.ranking.forEach(function (item) {
            const avatar = CHARACTER_AVATARS[item.character] || "🙂";
            html += "<li>" + avatar + " " + item.name + "（" + item.character_name + "）- " + item.count + " 格</li>";
        });
        html += "</ol>";
        resultBox.innerHTML = html;
        addLog("遊戲結束：" + data.winner_text);
    });
});
</script>
</body>
</html>
