<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>知識爭奪戰</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
:root {
    --bg: #1b1b2f;
    --card: #26263f;
    --card2: #2f2f4d;
    --line: #43436c;
    --text: #ffffff;
    --sub: #c9c9e6;
    --primary: #4f8cff;
    --success: #19b16f;
    --danger: #e05050;
    --gold: #d79a1e;
    --gray: #7e7e9d;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    background: linear-gradient(180deg, #171726 0%, #23233a 100%);
    color: var(--text);
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px;
}

h1, h2, h3, h4, p {
    margin-top: 0;
}

.hidden {
    display: none !important;
}

.card {
    background: var(--card);
    border-radius: 18px;
    padding: 16px;
    border: 1px solid var(--line);
    box-shadow: 0 6px 20px rgba(0,0,0,0.28);
}

.top-layout {
    display: grid;
    grid-template-columns: 1.4fr 0.9fr;
    gap: 16px;
}

.setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.full-span {
    grid-column: 1 / -1;
}

input, select, button {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    font-size: 15px;
}

input, select {
    background: #19192d;
    color: white;
}

button {
    cursor: pointer;
    border: none;
    color: white;
    font-weight: bold;
}

.btn-primary { background: var(--primary); }
.btn-success { background: var(--success); }
.btn-danger { background: var(--danger); }
.btn-gold { background: var(--gold); }
.btn-gray { background: var(--gray); }
.btn-dark { background: #111827; }

.section-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.small-text {
    color: var(--sub);
    font-size: 13px;
    line-height: 1.5;
}

/* ===== 角色卡 ===== */
.character-list {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.character-card {
    background: var(--card2);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 10px;
    cursor: pointer;
    transition: 0.15s ease;
    text-align: center;
}

.character-card:hover {
    transform: translateY(-2px);
}

.character-card.selected {
    border-color: #ffd54a;
    box-shadow: 0 0 0 2px rgba(255,213,74,0.2);
}

.character-card.disabled {
    opacity: 0.35;
    filter: grayscale(1);
    pointer-events: none;
}

.character-card img {
    width: 74px;
    height: 74px;
    object-fit: contain;
    margin-bottom: 6px;
}

.character-name {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 4px;
}

.character-desc {
    font-size: 12px;
    color: var(--sub);
    min-height: 32px;
}

/* ===== 題庫卡 ===== */
.difficulty-list {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.diff-card {
    background: var(--card2);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: 0.15s ease;
    text-align: center;
    font-weight: bold;
}

.diff-card.selected {
    border-color: #4f8cff;
}

.diff-card .emoji {
    font-size: 28px;
    margin-bottom: 6px;
}

/* ===== 房間資訊 ===== */
.room-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
}

.badge-chip {
    background: #18182a;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--sub);
}

/* ===== 遊戲區 ===== */
.game-area {
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 16px;
    align-items: start;
    margin-top: 14px;
}

.grid-wrap {
    overflow-x: auto;
    padding-bottom: 4px;
}

.grid {
    display: grid;
    gap: 8px;
    justify-content: start;
    width: max-content;
    min-width: 100%;
}

.cell {
    width: 76px;
    height: 76px;
    background: linear-gradient(180deg, #4a4a66 0%, #3f3f58 100%);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    text-align: center;
    padding: 4px;
    font-size: 12px;
}

.cell.hidden {
    background: linear-gradient(180deg, #505070 0%, #40405b 100%);
}

.cell.blocked {
    background: linear-gradient(180deg, #8f8f99 0%, #74747d 100%);
}

.cell.adjacent {
    box-shadow: inset 0 0 0 3px #2cd48b;
}

.cell.my-pos {
    outline: 3px solid #ffd54a;
    outline-offset: 2px;
}

.cell-owner-name {
    position: absolute;
    bottom: 2px;
    left: 4px;
    right: 4px;
    font-size: 10px;
    font-weight: bold;
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.7);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.player-img {
    width: 42px;
    height: 42px;
    object-fit: contain;
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    animation: floaty 1.4s ease-in-out infinite;
}

@keyframes floaty {
    0% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-3px); }
    100% { transform: translateX(-50%) translateY(0); }
}

/* ===== 右側技能區 ===== */
.side-panel h4 {
    margin-bottom: 8px;
}

.skill-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.skill-btn {
    margin: 0;
}

.skill-note {
    font-size: 12px;
    color: var(--sub);
    line-height: 1.4;
}

.preview-box, .question-box {
    margin-top: 14px;
}

.option-list {
    display: grid;
    gap: 8px;
    margin-top: 10px;
}

.option-btn {
    background: var(--primary);
    color: white;
}

.timer-pill {
    display: inline-block;
    padding: 6px 10px;
    background: rgba(224,80,80,0.15);
    border: 1px solid rgba(224,80,80,0.35);
    border-radius: 999px;
    color: #ffd6d6;
    font-size: 13px;
    font-weight: bold;
    margin-top: 10px;
}

/* ===== 玩家資訊 ===== */
.players-panel {
    display: grid;
    gap: 10px;
}

.player-card {
    background: var(--card2);
    border-radius: 14px;
    padding: 10px;
    border: 1px solid var(--line);
}

.player-top {
    display: flex;
    align-items: center;
    gap: 10px;
}

.player-avatar {
    width: 50px;
    height: 50px;
    object-fit: contain;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 4px;
}

.player-name {
    font-weight: bold;
    font-size: 15px;
}

.player-sub {
    font-size: 12px;
    color: var(--sub);
}

.player-stats {
    margin-top: 8px;
    font-size: 13px;
    color: var(--sub);
    line-height: 1.5;
}

/* ===== 日誌 ===== */
.log-box {
    background: #131320;
    border-radius: 14px;
    padding: 10px;
    min-height: 180px;
    max-height: 300px;
    overflow-y: auto;
    text-align: left;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid var(--line);
}

/* ===== 結算彈窗 ===== */
#resultModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 20px;
}

#resultBox {
    width: 100%;
    max-width: 520px;
    background: #222238;
    border-radius: 18px;
    padding: 22px;
    border: 1px solid var(--line);
    animation: popin 0.25s ease;
}

@keyframes popin {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #2c2c46;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 10px;
}

.result-item img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 4px;
}

.result-main {
    flex: 1;
    text-align: left;
}

.result-name {
    font-weight: bold;
    font-size: 15px;
}

.result-role {
    font-size: 12px;
    color: var(--sub);
}

.result-score {
    font-size: 18px;
    font-weight: bold;
    color: #ffd54a;
}

/* ===== 特效 ===== */
.effect-overlay {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    z-index: 9998;
}

.effect-overlay.show {
    display: flex;
}

.effect-text {
    font-size: 42px;
    font-weight: 900;
    color: white;
    text-shadow: 0 4px 12px rgba(0,0,0,0.35);
    animation: fadePop 0.8s ease;
}

.freeze-overlay.show {
    background: rgba(79,140,255,0.18);
}

.bomb-overlay.show {
    background: rgba(224,80,80,0.18);
}

@keyframes fadePop {
    0% { transform: scale(0.85); opacity: 0; }
    25% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.08); opacity: 0; }
}

/* ===== 響應式 ===== */
@media (max-width: 980px) {
    .top-layout {
        grid-template-columns: 1fr;
    }

    .game-area {
        grid-template-columns: 1fr;
    }

    .character-list {
        grid-template-columns: repeat(2, 1fr);
    }

    .difficulty-list {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 640px) {
    .setup-grid {
        grid-template-columns: 1fr;
    }

    .character-list {
        grid-template-columns: repeat(2, 1fr);
    }

    .difficulty-list {
        grid-template-columns: repeat(2, 1fr);
    }

    .cell {
        width: 66px;
        height: 66px;
    }

    .player-img {
        width: 36px;
        height: 36px;
    }

    .effect-text {
        font-size: 30px;
    }
}
</style>
</head>

<body>
<div class="effect-overlay freeze-overlay" id="freezeOverlay">
    <div class="effect-text">⏳ 時間凍結！</div>
</div>

<div class="effect-overlay bomb-overlay" id="bombOverlay">
    <div class="effect-text">💥 炸彈爆炸！</div>
</div>

<div class="container">
    <h1>知識爭奪戰</h1>

    <!-- Lobby -->
    <div id="lobby" class="card">
        <div class="section-title">建立 / 加入房間</div>

        <div class="setup-grid">
            <input id="room" placeholder="房間號">
            <input id="nickname" placeholder="你的暱稱">
            <select id="board">
                <option value="3">3x3</option>
                <option value="4">4x4</option>
                <option value="5">5x5</option>
                <option value="6">6x6</option>
            </select>
            <select id="players">
                <option value="2">2人</option>
                <option value="3">3人</option>
                <option value="4">4人</option>
            </select>
        </div>

        <div class="section-title" style="margin-top:16px;">題庫模式</div>
        <div class="difficulty-list" id="difficultyList"></div>

        <div class="section-title" style="margin-top:16px;">選擇角色</div>
        <div class="character-list" id="characters"></div>

        <div style="margin-top:14px;">
            <button class="btn-primary" onclick="joinGame()">加入房間</button>
        </div>
    </div>

    <!-- Game -->
    <div id="game" class="hidden">
        <div class="top-layout">
            <div class="card">
                <div class="section-title">遊戲地圖</div>

                <div id="roomBadges" class="room-badges"></div>

                <div class="legend">
                    <div class="badge-chip">🟩 綠框：可挑戰</div>
                    <div class="badge-chip">🟨 黃框：你的位置</div>
                    <div class="badge-chip">灰色：不可再前進</div>
                </div>

                <div class="game-area">
                    <div class="grid-wrap">
                        <div id="grid" class="grid"></div>
                    </div>

                    <div class="side-panel">
                        <div class="card" style="padding:12px;">
                            <h4>技能操作</h4>
                            <div class="skill-panel">
                                <button id="btnRemove" class="btn-success skill-btn" onclick="useSkill('remove')">✂️ 刪2選項</button>
                                <button id="btnReset" class="btn-danger skill-btn" onclick="useSkill('reset')">🔄 重置灰格</button>
                                <button id="btnOccupy" class="btn-gold skill-btn" onclick="useSkill('occupy')">👑 直接霸佔</button>
                                <button id="btnFreeze" class="btn-primary skill-btn" onclick="useSkill('freeze')">⏳ 時間凍結</button>
                                <button id="btnBomb" class="btn-danger skill-btn" onclick="useSkill('bomb')">💣 炸彈</button>
                            </div>
                            <p class="skill-note">提示：重置灰格需要先點一個鄰近灰格。霸佔 / 炸彈可在預覽格時使用。</p>
                            <p class="skill-note" id="selectedTargetText">目前未選擇灰格</p>
                        </div>
                    </div>
                </div>

                <div id="previewBox" class="card preview-box">
                    <div class="section-title">格子預覽</div>
                    <div><strong>題型：</strong><span id="previewType"></span></div>
                    <div style="margin-top:12px;">
                        <button class="btn-primary" id="startAnswerBtn">📝 確認作答</button>
                        <button class="btn-gray" id="cancelPreviewBtn">取消</button>
                    </div>
                </div>

                <div id="questionBox" class="card question-box">
                    <div class="section-title">題目挑戰</div>
                    <div><strong>題型：</strong><span id="qType"></span></div>
                    <div class="question-title" style="margin-top:10px;"><span id="qText"></span></div>
                    <div class="timer-pill">⏳ 剩餘時間：<span id="timerText">15</span> 秒</div>
                    <div id="optionsArea" class="option-list"></div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">玩家資訊</div>
                <div id="playersPanel" class="players-panel"></div>

                <div class="section-title" style="margin-top:16px;">系統訊息</div>
                <div id="logBox" class="log-box"></div>
            </div>
        </div>
    </div>
</div>

<!-- 結算 -->
<div id="resultModal">
    <div id="resultBox">
        <h2>🏆 遊戲結果</h2>
        <div id="resultTitle" style="margin-bottom:14px;"></div>
        <div id="resultContent"></div>
        <button class="btn-primary" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
const socket = io();

let myId = "";
let roomId = "";
let selectedChar = "";
let selectedDifficulty = "mixed";
let latestRoomState = null;
let previewCell = null;
let selectedBlockedCell = null;
let answerTimer = null;

const characterMeta = {
    scholar: { name: "學霸", desc: "刪2 ×3", image: "/static/characters/scholar.png" },
    landlord: { name: "霸道地主", desc: "霸佔 ×1", image: "/static/characters/landlord.png" },
    seer: { name: "先知", desc: "顯示題型", image: "/static/characters/seer.png" },
    time_master: { name: "時間大師", desc: "凍結 5 秒", image: "/static/characters/time_master.png" },
    bomber: { name: "炸彈怪客", desc: "炸彈 ×1", image: "/static/characters/bomber.png" }
};

const difficultyMeta = {
    normal: { name: "普通題型", emoji: "🙂" },
    hard: { name: "困難題型", emoji: "😤" },
    extreme: { name: "超級難題型", emoji: "🔥" },
    mixed: { name: "綜合題型", emoji: "🎲" }
};

function addLog(text) {
    const log = document.getElementById("logBox");
    const div = document.createElement("div");
    div.textContent = "• " + text;
    log.prepend(div);
}

function getMyPlayer() {
    if (!latestRoomState || !latestRoomState.players || !myId) return null;
    return latestRoomState.players[myId] || null;
}

function renderDifficultyCards() {
    const box = document.getElementById("difficultyList");
    box.innerHTML = "";

    Object.keys(difficultyMeta).forEach(key => {
        const meta = difficultyMeta[key];
        const card = document.createElement("div");
        card.className = "diff-card";
        if (selectedDifficulty === key) card.classList.add("selected");

        card.innerHTML = `
            <div class="emoji">${meta.emoji}</div>
            <div>${meta.name}</div>
        `;

        card.onclick = () => {
            selectedDifficulty = key;
            renderDifficultyCards();
        };

        box.appendChild(card);
    });
}

function renderCharacters(chosen = []) {
    const box = document.getElementById("characters");
    box.innerHTML = "";

    Object.keys(characterMeta).forEach(key => {
        const meta = characterMeta[key];
        const me = getMyPlayer();
        const disabled = chosen.includes(key) && (!me || me.character !== key);

        const div = document.createElement("div");
        div.className = "character-card";
        if (selectedChar === key) div.classList.add("selected");
        if (disabled) div.classList.add("disabled");

        div.innerHTML = `
            <img src="${meta.image}" alt="${meta.name}">
            <div class="character-name">${meta.name}</div>
            <div class="character-desc">${meta.desc}</div>
        `;

        if (!disabled) {
            div.onclick = () => {
                selectedChar = key;
                renderCharacters(chosen);
            };
        }

        box.appendChild(div);
    });
}

function joinGame() {
    roomId = document.getElementById("room").value.trim();
    const nickname = document.getElementById("nickname").value.trim();

    if (!roomId) {
        addLog("請輸入房間號");
        return;
    }
    if (!nickname) {
        addLog("請輸入暱稱");
        return;
    }
    if (!selectedChar) {
        addLog("請先選擇角色");
        return;
    }

    socket.emit("join", {
        room: roomId,
        nickname: nickname,
        character: selectedChar,
        board_size: document.getElementById("board").value,
        max_players: document.getElementById("players").value,
        difficulty_mode: selectedDifficulty
    });
}

function renderRoomBadges(data) {
    const box = document.getElementById("roomBadges");
    box.innerHTML = "";

    const items = [
        `房間：${data.room}`,
        `地圖：${data.board_size}x${data.board_size}`,
        `人數上限：${data.max_players}`,
        `題庫：${data.difficulty_label}`,
        data.started ? "狀態：進行中" : "狀態：等待開始"
    ];

    items.forEach(t => {
        const div = document.createElement("div");
        div.className = "badge-chip";
        div.textContent = t;
        box.appendChild(div);
    });
}

function renderPlayers(data) {
    const box = document.getElementById("playersPanel");
    box.innerHTML = "";

    Object.entries(data.players).forEach(([sid, p]) => {
        const div = document.createElement("div");
        div.className = "player-card";

        const meText = sid === myId ? "（你）" : "";
        const hostText = sid === data.host_id ? " <span class='badge'>房主</span>" : "";

        div.innerHTML = `
            <div class="player-top">
                <img class="player-avatar" src="${p.character_image}" alt="${p.character_name}">
                <div>
                    <div class="player-name">${p.nickname}${meText}${hostText}</div>
                    <div class="player-sub">${p.character_name}</div>
                </div>
            </div>
            <div class="player-stats">
                系統編號：${p.name}<br>
                位置：(${p.pos[0]}, ${p.pos[1]})<br>
                佔領格數：${p.occupied_count}<br>
                狀態：${p.finished ? "已結束" : "進行中"}<br>
                刪2：${p.skills.remove_two}｜
                重置：${p.skills.reset_block}｜
                霸佔：${p.skills.force_occupy}｜
                凍結：${p.skills.freeze_time}｜
                炸彈：${p.skills.bomb_cell}
            </div>
        `;
        box.appendChild(div);
    });
}

function drawGrid(data) {
    const grid = document.getElementById("grid");
    grid.style.gridTemplateColumns = `repeat(${data.board_size}, 76px)`;
    grid.innerHTML = "";

    const me = getMyPlayer();

    data.grid.forEach((row, i) => {
        row.forEach((cell, j) => {
            const div = document.createElement("div");
            div.className = "cell " + cell.status;

            if (me && Math.abs(me.pos[0] - i) + Math.abs(me.pos[1] - j) === 1 && cell.status === "hidden") {
                div.classList.add("adjacent");
            }
            if (me && me.pos[0] === i && me.pos[1] === j) {
                div.classList.add("my-pos");
            }

            if (cell.status === "hidden") {
                div.textContent = cell.type ? cell.type : "?";
            }

            if (cell.owner && data.players[cell.owner]) {
                const owner = data.players[cell.owner];
                const img = document.createElement("img");
                img.src = owner.character_image;
                img.className = "player-img";
                div.appendChild(img);

                const label = document.createElement("div");
                label.className = "cell-owner-name";
                label.textContent = owner.nickname;
                div.appendChild(label);

                div.style.background = owner.color;
            }

            div.onclick = () => {
                handleCellClick(data, i, j, cell);
            };

            grid.appendChild(div);
        });
    });
}

function handleCellClick(data, x, y, cell) {
    const me = getMyPlayer();
    if (!me || !data.started || me.finished) return;

    const isAdjacent = Math.abs(me.pos[0] - x) + Math.abs(me.pos[1] - y) === 1;

    if (cell.status === "blocked" && isAdjacent) {
        selectedBlockedCell = {x, y};
        document.getElementById("selectedTargetText").textContent = `目前選擇灰格：(${x}, ${y})`;
        addLog(`已選擇灰格 (${x}, ${y})`);
        return;
    }

    if (cell.status !== "hidden") return;

    previewCell = {x, y};
    socket.emit("preview_cell", { room: data.room, x, y });
}

function startTimer(seconds) {
    clearInterval(answerTimer);
    let remain = seconds;
    document.getElementById("timerText").textContent = remain;
    answerTimer = setInterval(() => {
        remain -= 1;
        document.getElementById("timerText").textContent = remain;
        if (remain <= 0) {
            clearInterval(answerTimer);
        }
    }, 1000);
}

function stopTimer() {
    clearInterval(answerTimer);
}

function showQuestion(data) {
    document.getElementById("questionBox").style.display = "block";
    document.getElementById("qType").textContent = data.type;
    document.getElementById("qText").textContent = data.q;

    const box = document.getElementById("optionsArea");
    box.innerHTML = "";

    data.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.onclick = () => {
            socket.emit("submit_answer", { room: roomId, answer: opt });
        };
        box.appendChild(btn);
    });

    startTimer(data.seconds);
}

function hideQuestion() {
    document.getElementById("questionBox").style.display = "none";
    stopTimer();
}

function showPreview(type) {
    document.getElementById("previewType").textContent = type;
    document.getElementById("previewBox").style.display = "block";
}

function hidePreview() {
    document.getElementById("previewBox").style.display = "none";
}

function useSkill(type) {
    if (!roomId) return;

    if (type === "remove") {
        socket.emit("use_remove_two", { room: roomId });
    } else if (type === "reset") {
        if (!selectedBlockedCell) {
            addLog("請先點選一個鄰近灰格");
            return;
        }
        socket.emit("use_reset_block", {
            room: roomId,
            x: selectedBlockedCell.x,
            y: selectedBlockedCell.y
        });
    } else if (type === "occupy") {
        if (!previewCell) {
            addLog("請先點一個可預覽格子");
            return;
        }
        socket.emit("use_force_occupy", {
            room: roomId,
            x: previewCell.x,
            y: previewCell.y
        });
    } else if (type === "freeze") {
        socket.emit("use_freeze_time", { room: roomId });
    } else if (type === "bomb") {
        if (!previewCell) {
            addLog("請先點一個格子再使用炸彈");
            return;
        }
        socket.emit("use_bomb_cell", {
            room: roomId,
            x: previewCell.x,
            y: previewCell.y
        });
    }
}

document.getElementById("startAnswerBtn").onclick = () => {
    if (!previewCell) return;
    socket.emit("start_answer", {
        room: roomId,
        x: previewCell.x,
        y: previewCell.y
    });
    hidePreview();
};

document.getElementById("cancelPreviewBtn").onclick = () => {
    hidePreview();
    previewCell = null;
};

socket.on("joined", (d) => {
    myId = d.sid;
    document.getElementById("lobby").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    addLog("成功加入房間");
});

socket.on("room_state", (data) => {
    latestRoomState = data;
    renderCharacters(data.chosen_characters || []);
    renderRoomBadges(data);
    renderPlayers(data);
    drawGrid(data);

    const me = getMyPlayer();
    document.getElementById("btnOccupy").style.display = (me && me.character === "landlord") ? "block" : "none";
    document.getElementById("btnFreeze").style.display = (me && me.character === "time_master") ? "block" : "none";
    document.getElementById("btnBomb").style.display = (me && me.character === "bomber") ? "block" : "none";

    if (data.host_id === myId && !data.started) {
        if (!document.getElementById("startGameBtnLive")) {
            const btn = document.createElement("button");
            btn.id = "startGameBtnLive";
            btn.className = "btn-primary";
            btn.textContent = "房主開始遊戲";
            btn.style.marginTop = "10px";
            btn.onclick = () => socket.emit("start_game", { room: roomId });
            document.getElementById("roomBadges").appendChild(btn);
        }
    } else {
        const old = document.getElementById("startGameBtnLive");
        if (old) old.remove();
    }
});

socket.on("cell_preview", (data) => {
    showPreview(`${data.type}（${data.x}, ${data.y}）`);
});

socket.on("question_started", (data) => {
    showQuestion(data);
});

socket.on("options_reduced", (data) => {
    const box = document.getElementById("optionsArea");
    box.innerHTML = "";
    data.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.onclick = () => {
            socket.emit("submit_answer", { room: roomId, answer: opt });
        };
        box.appendChild(btn);
    });
    addLog("已使用刪除兩個選項");
});

socket.on("question_timeout", () => {
    hideQuestion();
    addLog("超時，該格變灰");
});

socket.on("freeze_effect", (data) => {
    const el = document.getElementById("freezeOverlay");
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 800);
    addLog(`你被時間凍結影響，時間 +${data.seconds} 秒`);
});

socket.on("bomb_effect", () => {
    const el = document.getElementById("bombOverlay");
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 700);
});

socket.on("self_message", (data) => {
    addLog(data.msg);
    if (
        data.msg.includes("答對") ||
        data.msg.includes("答錯") ||
        data.msg.includes("超時")
    ) {
        hideQuestion();
        hidePreview();
    }
});

socket.on("system_message", (data) => {
    addLog(data.msg);
});

socket.on("game_over", (data) => {
    stopTimer();
    document.getElementById("resultTitle").innerHTML = `<strong>${data.winner_text}</strong>`;

    const box = document.getElementById("resultContent");
    box.innerHTML = "";

    data.ranking.forEach((p, index) => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
            <img src="${p.character_image}" alt="${p.character_name}">
            <div class="result-main">
                <div class="result-name">${index === 0 ? "👑 " : ""}${p.name}</div>
                <div class="result-role">${p.character_name}</div>
            </div>
            <div class="result-score"><b>${p.count}</b></div>
        `;
        box.appendChild(div);
    });

    document.getElementById("resultModal").style.display = "flex";
});

renderDifficultyCards();
renderCharacters();
</script>
</body>
</html>
