<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知識爭奪戰</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      background: radial-gradient(circle at top left, #16193b 0%, #0d1028 45%, #090b1d 100%);
      color: #fff;
    }

    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .title {
      font-size: 58px;
      font-weight: 900;
      margin: 0 0 18px;
      text-shadow: 0 4px 16px rgba(0,0,0,.35);
    }

    .card {
      background: rgba(47, 48, 92, 0.92);
      border: 1px solid rgba(119, 132, 255, 0.35);
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(0,0,0,.22);
      overflow: hidden;
    }

    .setup-wrap {
      padding: 22px;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .input, .select, .btn {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
    }

    .input, .select {
      background: #171938;
      color: #fff;
      border: 1px solid rgba(130,141,255,.35);
    }

    .label {
      font-size: 15px;
      font-weight: 800;
      color: #dfe3ff;
      margin-bottom: 10px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .mode-card, .role-card {
      background: rgba(255,255,255,.04);
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 18px 14px;
      cursor: pointer;
      transition: .2s ease;
      text-align: center;
    }

    .mode-card:hover, .role-card:hover {
      transform: translateY(-2px);
      border-color: rgba(117,162,255,.7);
    }

    .mode-card.active, .role-card.active {
      border-color: #5d93ff;
      box-shadow: 0 0 0 3px rgba(93,147,255,.16) inset;
    }

    .mode-emoji {
      font-size: 34px;
      margin-bottom: 10px;
      display: block;
    }

    .mode-name {
      font-size: 16px;
      font-weight: 900;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      margin: 0 auto 10px;
      display: block;
      object-fit: cover;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
    }

    .role-name {
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .role-skill {
      font-size: 14px;
      color: #cdd4ff;
      font-weight: 700;
      line-height: 1.5;
    }

    .join-btn {
      background: linear-gradient(90deg, #5a8dff, #4c86f6);
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }

    .join-btn:hover { filter: brightness(1.06); }

    .game-layout {
      display: none;
      grid-template-columns: 1.6fr 1fr;
      gap: 14px;
    }

    .game-layout.show { display: grid; }

    .left-panel-inner, .right-panel-inner { padding: 16px; }

    .sub-title {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: #171938;
      border: 1px solid rgba(132,144,255,.35);
      font-size: 14px;
      font-weight: 800;
    }

    .legend {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .legend-item {
      background: #171938;
      border: 1px solid rgba(132,144,255,.28);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    .map-and-skill {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 14px;
      margin-bottom: 14px;
    }

    .map-wrap, .skill-box, .preview-box, .question-box, .panel-box {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(132,144,255,.25);
      border-radius: 20px;
      padding: 14px;
    }

    .map-grid {
      display: grid;
      gap: 12px;
      justify-content: start;
      min-height: 380px;
    }

    .tile {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, #28305d 0%, #1e2445 100%);
      position: relative;
      cursor: pointer;
      transition: .15s ease;
      overflow: hidden;
    }

    .tile:hover {
      transform: translateY(-2px) scale(1.02);
      border-color: #84a5ff;
    }

    .tile.disabled {
      opacity: .5;
      cursor: not-allowed;
      filter: grayscale(.2);
    }

    .tile.preview {
      box-shadow: 0 0 0 3px rgba(255,207,87,.65) inset;
      border-color: #ffcf57;
    }

    .tile.owner-green {
      background: linear-gradient(180deg, #214d47 0%, #153832 100%);
    }

    .tile.owner-red {
      background: linear-gradient(180deg, #5a2b38 0%, #3d1a26 100%);
    }

    .tile-header {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .tile-type {
      position: absolute;
      bottom: 8px;
      left: 10px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(0,0,0,.22);
      padding: 4px 8px;
      border-radius: 999px;
      max-width: calc(100% - 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-marker {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 3px solid rgba(255,255,255,.72);
      object-fit: cover;
      background: #fff;
    }

    .two-markers { position: absolute; inset: 0; }

    .marker-mini {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 3px solid rgba(255,255,255,.75);
      object-fit: cover;
      background: #fff;
    }

    .marker-mini.m1 { top: 16px; left: 14px; }
    .marker-mini.m2 { top: 42px; right: 14px; }

    .skill-box h3, .preview-box h3, .question-box h3, .panel-box h3 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 900;
    }

    .skill-btn {
      margin-bottom: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }

    .skill-green { background: #1bb56e; }
    .skill-red { background: #e15050; }
    .skill-blue { background: #4d84f7; }
    .skill-purple { background: #8b5cf6; }
    .skill-orange { background: #f59e0b; }

    .skill-note {
      color: #d3dcff;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
    }

    .muted { color: #cbd4ff; }

    .preview-actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-confirm {
      background: #4e84f3;
      color: #fff;
      cursor: pointer;
    }

    .btn-cancel {
      background: #8a8db0;
      color: #fff;
      cursor: pointer;
    }

    .question-type-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(225,94,94,.14);
      color: #ffd4d4;
      border: 1px solid rgba(255,126,126,.28);
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .question-card {
      background: #171938;
      border: 1px solid rgba(132,144,255,.25);
      border-radius: 18px;
      padding: 14px;
      display: none;
    }

    .question-card.show { display: block; }

    .question-text {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(132,144,255,.22);
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
    }

    .option:hover { border-color: #84a5ff; }

    .option.selected {
      border-color: #60a0ff;
      background: rgba(96,160,255,.16);
    }

    .result-box {
      margin-top: 12px;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 900;
      display: none;
      line-height: 1.6;
    }

    .result-box.show { display: block; }

    .result-correct {
      background: rgba(27,181,110,.16);
      color: #c9ffe6;
      border: 1px solid rgba(27,181,110,.38);
    }

    .result-wrong {
      background: rgba(225,80,80,.16);
      color: #ffd7d7;
      border: 1px solid rgba(225,80,80,.35);
    }

    .player-list {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }

    .player-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(132,144,255,.25);
      border-radius: 20px;
      padding: 14px;
    }

    .player-top {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      margin-bottom: 10px;
    }

    .player-avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
    }

    .player-name {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .player-role {
      font-size: 15px;
      color: #d5dcff;
      font-weight: 800;
    }

    .player-info {
      font-size: 15px;
      line-height: 1.65;
      color: #eef2ff;
      font-weight: 700;
    }

    .system-log {
      background: #090b17;
      border: 1px solid rgba(132,144,255,.25);
      border-radius: 18px;
      padding: 14px;
      min-height: 180px;
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-line;
      overflow-y: auto;
    }

    .hidden { display: none !important; }

    .winner-modal {
      position: fixed;
      inset: 0;
      background: rgba(3,6,18,.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .winner-modal.show { display: flex; }

    .winner-card {
      width: min(480px, 100%);
      background: linear-gradient(180deg, #2f305c 0%, #232647 100%);
      border: 1px solid rgba(132,144,255,.36);
      border-radius: 26px;
      padding: 24px;
      text-align: center;
    }

    .winner-card img {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      margin-bottom: 12px;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,.7);
      background: #fff;
    }

    .winner-big {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .winner-text {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #dfe5ff;
    }

    .winner-stat {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .close-btn {
      background: #4d84f7;
      color: #fff;
      cursor: pointer;
    }

    .mobile-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1200;
      padding: 0;
    }

    .mobile-modal.show {
      display: flex;
    }

    .mobile-sheet {
      width: 100%;
      max-width: 560px;
      background: #2f305c;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 18px 16px 20px;
      box-shadow: 0 -12px 30px rgba(0,0,0,.28);
    }

    .mobile-sheet.large {
      max-height: 88vh;
      overflow-y: auto;
    }

    .mobile-sheet-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .mobile-sheet-content {
      font-size: 16px;
      line-height: 1.7;
      color: #e8ecff;
      margin-bottom: 14px;
    }

    .mobile-sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    @media (min-width: 901px) {
      .mobile-modal {
        align-items: center;
      }

      .mobile-sheet {
        border-radius: 24px;
      }
    }

    @media (max-width: 1200px) {
      .role-grid { grid-template-columns: repeat(3, 1fr); }
      .mode-grid { grid-template-columns: repeat(2, 1fr); }
      .game-layout.show { grid-template-columns: 1fr; }
      .map-and-skill { grid-template-columns: 1fr; }
      .title { font-size: 42px; }
    }

    @media (max-width: 768px) {
      .row, .role-grid, .mode-grid { grid-template-columns: 1fr; }
      .tile { width: 82px; height: 82px; }
      .title { font-size: 36px; }
      .mapGrid { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">知識爭奪戰</div>

    <div id="setupScreen" class="card setup-wrap">
      <div class="section-title">建立 / 加入房間</div>

      <div class="row">
        <input id="roomInput" class="input" placeholder="房間號" value="123" />
        <input id="nicknameInput" class="input" placeholder="你的暱稱" value="555" />
      </div>

      <div class="row">
        <select id="mapSizeSelect" class="select">
          <option value="3">3x3</option>
          <option value="4">4x4</option>
          <option value="5">5x5</option>
        </select>
        <select id="playerCountSelect" class="select">
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人</option>
        </select>
      </div>

      <div class="label">題庫模式</div>
      <div id="modeGrid" class="mode-grid"></div>

      <div class="label">選擇角色</div>
      <div id="roleGrid" class="role-grid"></div>

      <button id="joinBtn" class="btn join-btn">加入房間</button>
    </div>

    <div id="gameScreen" class="game-layout">
      <div class="card">
        <div class="left-panel-inner">
          <div class="sub-title">遊戲地圖</div>

          <div class="chips">
            <div class="chip" id="chipRoom">房間：123</div>
            <div class="chip" id="chipMap">地圖：3x3</div>
            <div class="chip" id="chipPlayers">人數上限：2</div>
            <div class="chip" id="chipMode">題庫：普通題型</div>
            <div class="chip" id="chipStatus">狀態：進行中</div>
          </div>

          <div class="legend">
            <div class="legend-item"><span class="legend-color" style="background:#1bb56e;"></span> 綠框 - 可挑戰</div>
            <div class="legend-item"><span class="legend-color" style="background:#ffb347;"></span> 黃框 - 你的位置</div>
            <div class="legend-item"><span class="legend-color" style="background:#e15050;"></span> 灰色 - 不可再前進</div>
          </div>

          <div class="map-and-skill">
            <div class="map-wrap">
              <div id="mapGrid" class="map-grid"></div>
            </div>

            <div class="skill-box">
              <h3>技能操作</h3>
              <div id="skillButtonsWrap"></div>
              <div class="skill-note" id="skillNote">
                只有你選擇的角色技能會顯示。<br>
                共通技能：重置灰格。
              </div>
            </div>
          </div>

          <div class="preview-box" style="margin-bottom:14px;">
            <h3>格子預覽</h3>
            <div id="previewContent" class="muted">請點選地圖格子後，將以彈窗方式顯示提示。</div>
            <div class="preview-actions">
              <button id="confirmChallengeBtn" class="btn btn-confirm">📝 確認作答</button>
              <button id="cancelPreviewBtn" class="btn btn-cancel">取消</button>
            </div>
          </div>

          <div class="question-box">
            <h3>題目挑戰</h3>
            <div class="question-type-tag">⏳ 剩餘時間：<span id="timerText">15 秒</span></div>

            <div id="questionCard" class="question-card">
              <div id="questionText" class="question-text"></div>
              <div id="optionsWrap" class="options"></div>
              <button id="submitAnswerBtn" class="btn btn-confirm" style="margin-top:12px;">送出答案</button>
              <div id="resultBox" class="result-box"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="right-panel-inner">
          <div class="sub-title">玩家資訊</div>
          <div id="playerList" class="player-list"></div>

          <div class="panel-box">
            <h3>系統訊息</h3>
            <div id="systemLog" class="system-log"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="winnerModal" class="winner-modal">
    <div class="winner-card">
      <img id="winnerAvatar" src="" alt="winner">
      <div class="winner-big">🎉 勝利！</div>
      <div id="winnerText" class="winner-text"></div>
      <div id="winnerStat" class="winner-stat"></div>
      <button id="closeWinnerBtn" class="btn close-btn">關閉</button>
    </div>
  </div>

  <div id="tileModal" class="mobile-modal">
    <div class="mobile-sheet">
      <div class="mobile-sheet-title">選擇格子</div>
      <div id="tileModalContent" class="mobile-sheet-content"></div>
      <div class="mobile-sheet-actions">
        <button id="tileModalCancelBtn" class="btn btn-cancel">取消</button>
        <button id="tileModalConfirmBtn" class="btn btn-confirm">確認挑戰</button>
      </div>
    </div>
  </div>

  <div id="questionModal" class="mobile-modal">
    <div class="mobile-sheet large">
      <div class="mobile-sheet-title">題目挑戰</div>
      <div class="question-type-tag">⏳ 剩餘時間：<span id="modalTimerText">15 秒</span></div>
      <div id="modalQuestionText" class="question-text"></div>
      <div id="modalOptionsWrap" class="options"></div>
      <div id="modalResultBox" class="result-box"></div>
      <div class="mobile-sheet-actions">
        <button id="modalCloseBtn" class="btn btn-cancel">取消</button>
        <button id="modalSubmitBtn" class="btn btn-confirm">送出答案</button>
      </div>
    </div>
  </div>

  <script>
    const ROLES = [
      {
        id: "scholar",
        name: "學霸",
        skillText: "刪 2 ×3",
        shortRole: "學霸",
        imageCandidates: [
          "static/characters/scholar.png",
          "static/characters/scholar.PNG"
        ],
        counts: { delete2: 3, reset: 1, occupy: 0, freeze: 0, bomb: 0, reveal: 0 }
      },
      {
        id: "landlord",
        name: "霸道地主",
        skillText: "霸佔 ×1",
        shortRole: "霸道地主",
        imageCandidates: [
          "static/characters/landlord.png",
          "static/characters/landlord.PNG"
        ],
        counts: { delete2: 0, reset: 1, occupy: 1, freeze: 0, bomb: 0, reveal: 0 }
      },
      {
        id: "prophet",
        name: "先知",
        skillText: "顯示題型",
        shortRole: "先知",
        imageCandidates: [
          "static/characters/prophet.png",
          "static/characters/prophet.PNG"
        ],
        counts: { delete2: 0, reset: 1, occupy: 0, freeze: 0, bomb: 0, reveal: 1 }
      },
      {
        id: "timeMaster",
        name: "時間大師",
        skillText: "凍結 5 秒",
        shortRole: "時間大師",
        imageCandidates: [
          "static/characters/time-master.png",
          "static/characters/time-master.PNG",
          "static/characters/timeMaster.png",
          "static/characters/timeMaster.PNG",
          "static/characters/timemaster.png",
          "static/characters/timemaster.PNG",
          "static/characters/時間大師.png"
        ],
        counts: { delete2: 0, reset: 1, occupy: 0, freeze: 1, bomb: 0, reveal: 0 }
      },
      {
        id: "bombMan",
        name: "炸彈怪客",
        skillText: "炸彈 ×1",
        shortRole: "炸彈怪客",
        imageCandidates: [
          "static/characters/bomb-man.png",
          "static/characters/bomb-man.PNG"
        ],
        counts: { delete2: 0, reset: 1, occupy: 0, freeze: 0, bomb: 1, reveal: 0 }
      }
    ];

    const MODES = [
      { id: "normal", name: "普通題型", emoji: "🙂" },
      { id: "hard", name: "困難題型", emoji: "🥱" },
      { id: "super", name: "超級難題型", emoji: "🔥" },
      { id: "mix", name: "綜合題型", emoji: "🎲" }
    ];

    const QUESTIONS = {
      normal: [
        { type: "國文", q: "「望梅止渴」主要是在形容什麼？", options: ["真正解渴", "以想像安慰自己", "梅子很好吃", "口渴不能忍"], answer: 1, explain: "是用想像來暫時安慰自己。" },
        { type: "數學", q: "15 + 27 = ?", options: ["40", "41", "42", "43"], answer: 2, explain: "15 + 27 = 42。" },
        { type: "地理", q: "台灣的首都是哪裡？", options: ["台中", "高雄", "台北", "台南"], answer: 2, explain: "台灣首都為台北。" }
      ],
      hard: [
        { type: "歷史", q: "鄭成功主要驅逐哪一個國家的勢力，收復台灣？", options: ["英國", "西班牙", "葡萄牙", "荷蘭"], answer: 3, explain: "鄭成功驅逐荷蘭勢力。" },
        { type: "科學", q: "水的化學式為何？", options: ["CO2", "H2O", "O2", "NaCl"], answer: 1, explain: "水的化學式是 H2O。" }
      ],
      super: [
        { type: "數學", q: "三角形兩角為 35 度與 65 度，第三角為？", options: ["70 度", "75 度", "80 度", "90 度"], answer: 2, explain: "180 - 35 - 65 = 80。" },
        { type: "邏輯", q: "所有 A 都是 B，所有 B 都是 C，則何者正確？", options: ["所有 C 都是 A", "所有 A 都是 C", "A 和 C 無關", "所有 B 都是 A"], answer: 1, explain: "由傳遞性可知所有 A 都是 C。" }
      ],
      mix: []
    };
    QUESTIONS.mix = [...QUESTIONS.normal, ...QUESTIONS.hard, ...QUESTIONS.super];

    const state = {
      selectedMode: "mix",
      selectedRoleId: "timeMaster",
      selectedTileIndex: null,
      mapSize: 3,
      playerLimit: 2,
      roomNo: "123",
      nickname: "555",
      currentQuestion: null,
      selectedAnswer: null,
      timer: 15,
      timerInterval: null,
      gameStarted: false,
      players: [],
      board: []
    };

    const modeGrid = document.getElementById("modeGrid");
    const roleGrid = document.getElementById("roleGrid");
    const joinBtn = document.getElementById("joinBtn");
    const setupScreen = document.getElementById("setupScreen");
    const gameScreen = document.getElementById("gameScreen");
    const mapGrid = document.getElementById("mapGrid");
    const playerList = document.getElementById("playerList");
    const systemLog = document.getElementById("systemLog");
    const previewContent = document.getElementById("previewContent");
    const questionCard = document.getElementById("questionCard");
    const questionText = document.getElementById("questionText");
    const optionsWrap = document.getElementById("optionsWrap");
    const resultBox = document.getElementById("resultBox");
    const submitAnswerBtn = document.getElementById("submitAnswerBtn");
    const timerText = document.getElementById("timerText");
    const skillButtonsWrap = document.getElementById("skillButtonsWrap");
    const winnerModal = document.getElementById("winnerModal");
    const winnerAvatar = document.getElementById("winnerAvatar");
    const winnerText = document.getElementById("winnerText");
    const winnerStat = document.getElementById("winnerStat");

    const tileModal = document.getElementById("tileModal");
    const tileModalContent = document.getElementById("tileModalContent");
    const tileModalCancelBtn = document.getElementById("tileModalCancelBtn");
    const tileModalConfirmBtn = document.getElementById("tileModalConfirmBtn");

    const questionModal = document.getElementById("questionModal");
    const modalTimerText = document.getElementById("modalTimerText");
    const modalQuestionText = document.getElementById("modalQuestionText");
    const modalOptionsWrap = document.getElementById("modalOptionsWrap");
    const modalResultBox = document.getElementById("modalResultBox");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalSubmitBtn = document.getElementById("modalSubmitBtn");

    function log(msg) {
      const time = new Date();
      const hh = String(time.getHours()).padStart(2, "0");
      const mm = String(time.getMinutes()).padStart(2, "0");
      const line = `- [${hh}:${mm}] ${msg}`;
      systemLog.textContent = systemLog.textContent ? `${systemLog.textContent}\n${line}` : line;
      systemLog.scrollTop = systemLog.scrollHeight;
    }

    function getModeName(id) {
      return MODES.find(m => m.id === id)?.name || "普通題型";
    }

    function getRoleById(id) {
      return ROLES.find(r => r.id === id);
    }

    function getRoleImage(role) {
      return role.imageCandidates[0];
    }

    function handleImgFallback(img) {
      try {
        const list = JSON.parse(img.dataset.fallbacks || "[]");
        let currentIndex = Number(img.dataset.index || "0");
        currentIndex += 1;

        if (currentIndex < list.length) {
          img.dataset.index = currentIndex;
          img.src = list[currentIndex];
        } else {
          img.onerror = null;
          img.src = "https://dummyimage.com/82x82/2d3566/ffffff&text=%E8%A7%92%E8%89%B2";
        }
      } catch (e) {
        img.onerror = null;
        img.src = "https://dummyimage.com/82x82/2d3566/ffffff&text=%E8%A7%92%E8%89%B2";
      }
    }

    function renderModes() {
      modeGrid.innerHTML = "";
      MODES.forEach(mode => {
        const div = document.createElement("div");
        div.className = "mode-card" + (state.selectedMode === mode.id ? " active" : "");
        div.innerHTML = `
          <span class="mode-emoji">${mode.emoji}</span>
          <div class="mode-name">${mode.name}</div>
        `;
        div.onclick = () => {
          state.selectedMode = mode.id;
          renderModes();
        };
        modeGrid.appendChild(div);
      });
    }

    function renderRoles() {
      roleGrid.innerHTML = "";
      ROLES.forEach(role => {
        const div = document.createElement("div");
        div.className = "role-card" + (state.selectedRoleId === role.id ? " active" : "");

        const fallbackJson = JSON.stringify(role.imageCandidates).replace(/"/g, "&quot;");

        div.innerHTML = `
          <img
            class="avatar"
            src="${getRoleImage(role)}"
            alt="${role.name}"
            data-fallbacks="${fallbackJson}"
            data-index="0"
            onerror="handleImgFallback(this)"
          >
          <div class="role-name">${role.name}</div>
          <div class="role-skill">${role.skillText}</div>
        `;

        div.onclick = () => {
          state.selectedRoleId = role.id;
          renderRoles();
        };
        roleGrid.appendChild(div);
      });
    }

    function createBoard(size) {
      const types = ["國文", "數學", "歷史", "地理", "科學", "邏輯"];
      const board = [];
      for (let i = 0; i < size * size; i++) {
        board.push({
          index: i,
          type: types[i % types.length],
          owner: null,
          disabled: false
        });
      }
      return board;
    }

    function initPlayers() {
      const myRole = getRoleById(state.selectedRoleId);
      const enemyRole = ROLES.find(r => r.id !== state.selectedRoleId) || ROLES[0];

      state.players = [
        {
          id: "p1",
          nickname: "321",
          roleName: enemyRole.shortRole,
          avatar: getRoleImage(enemyRole),
          avatarFallbacks: enemyRole.imageCandidates,
          position: 0,
          score: 1,
          status: "進行中",
          counts: { ...enemyRole.counts },
          revealedTiles: []
        },
        {
          id: "p2",
          nickname: state.nickname || "555",
          roleName: myRole.shortRole,
          avatar: getRoleImage(myRole),
          avatarFallbacks: myRole.imageCandidates,
          position: state.mapSize - 1,
          score: 1,
          status: "進行中",
          counts: { ...myRole.counts },
          isMe: true,
          revealedTiles: []
        }
      ];
    }

    function updateTopChips() {
      document.getElementById("chipRoom").textContent = `房間：${state.roomNo}`;
      document.getElementById("chipMap").textContent = `地圖：${state.mapSize}x${state.mapSize}`;
      document.getElementById("chipPlayers").textContent = `人數上限：${state.playerLimit}`;
      document.getElementById("chipMode").textContent = `題庫：${getModeName(state.selectedMode)}`;
      document.getElementById("chipStatus").textContent = `狀態：${state.gameStarted ? "進行中" : "待開始"}`;
    }

    function renderPlayers() {
      playerList.innerHTML = "";
      state.players.forEach((player, idx) => {
        const fallbackJson = JSON.stringify(player.avatarFallbacks || [player.avatar]).replace(/"/g, "&quot;");
        const card = document.createElement("div");
        card.className = "player-card";
        card.innerHTML = `
          <div class="player-top">
            <img
              class="player-avatar"
              src="${player.avatar}"
              alt="${player.nickname}"
              data-fallbacks="${fallbackJson}"
              data-index="0"
              onerror="handleImgFallback(this)"
            >
            <div>
              <div class="player-name">${player.nickname}${player.isMe ? "（你）" : ""}</div>
              <div class="player-role">${player.roleName}</div>
            </div>
          </div>
          <div class="player-info">
            系統編號：玩家${idx + 1}<br>
            位置：(${Math.floor(player.position / state.mapSize)}, ${player.position % state.mapSize})<br>
            佔領格數：${player.score}<br>
            狀態：${player.status}<br>
            刪2：${player.counts.delete2} ｜ 重置：${player.counts.reset} ｜ 霸佔：${player.counts.occupy} ｜ 凍結：${player.counts.freeze} ｜ 炸彈：${player.counts.bomb} ｜ 顯示題型：${player.counts.reveal}
          </div>
        `;
        playerList.appendChild(card);
      });
    }

    function playerAtTile(tileIndex) {
      return state.players.filter(p => p.position === tileIndex);
    }

    function getSimpleHint(type) {
      if (["國文", "歷史", "地理"].includes(type)) return "📘 人文類";
      if (["數學", "科學"].includes(type)) return "🔬 理科類";
      if (["邏輯"].includes(type)) return "🧠 推理類";
      return "❓ 未知";
    }

    function renderMap() {
      mapGrid.innerHTML = "";
      mapGrid.style.gridTemplateColumns = `repeat(${state.mapSize}, 96px)`;

      const me = state.players.find(p => p.isMe);

      state.board.forEach(tile => {
        const div = document.createElement("div");
        const playersHere = playerAtTile(tile.index);
        const isPreview = state.selectedTileIndex === tile.index;
        const isMyPos = me && me.position === tile.index;

        let cls = "tile";
        if (tile.owner === "green") cls += " owner-green";
        if (tile.owner === "red") cls += " owner-red";
        if (tile.disabled) cls += " disabled";
        if (isPreview || isMyPos) cls += " preview";
        div.className = cls;

        const canSeeTrueType =
          me &&
          Array.isArray(me.revealedTiles) &&
          me.revealedTiles.includes(tile.index);

        const displayLabel = canSeeTrueType ? tile.type : "❓";

        div.innerHTML = `
          <div class="tile-header">#${tile.index + 1}</div>
          <div class="tile-type">${displayLabel}</div>
        `;

        if (playersHere.length === 1) {
          const fallbackJson = JSON.stringify(playersHere[0].avatarFallbacks || [playersHere[0].avatar]).replace(/"/g, "&quot;");
          div.innerHTML += `
            <img
              class="player-marker"
              src="${playersHere[0].avatar}"
              alt="player"
              data-fallbacks="${fallbackJson}"
              data-index="0"
              onerror="handleImgFallback(this)"
            >
          `;
        } else if (playersHere.length >= 2) {
          const fb1 = JSON.stringify(playersHere[0].avatarFallbacks || [playersHere[0].avatar]).replace(/"/g, "&quot;");
          const fb2 = JSON.stringify(playersHere[1].avatarFallbacks || [playersHere[1].avatar]).replace(/"/g, "&quot;");
          div.innerHTML += `
            <div class="two-markers">
              <img
                class="marker-mini m1"
                src="${playersHere[0].avatar}"
                alt="p1"
                data-fallbacks="${fb1}"
                data-index="0"
                onerror="handleImgFallback(this)">
              <img
                class="marker-mini m2"
                src="${playersHere[1].avatar}"
                alt="p2"
                data-fallbacks="${fb2}"
                data-index="0"
                onerror="handleImgFallback(this)">
            </div>
          `;
        }

        div.onclick = () => onTileClick(tile.index);
        mapGrid.appendChild(div);
      });
    }

    function renderSkillButtons() {
      const me = state.players.find(p => p.isMe);
      if (!me) return;

      skillButtonsWrap.innerHTML = "";
      const buttons = [];

      if (me.counts.delete2 > 0) {
        buttons.push({ text: `✂️ 刪2選項 (${me.counts.delete2})`, className: "skill-green", onClick: useDelete2 });
      }

      if (me.counts.occupy > 0) {
        buttons.push({ text: `🏰 霸佔 (${me.counts.occupy})`, className: "skill-orange", onClick: useOccupy });
      }

      if (me.counts.reveal > 0) {
        buttons.push({ text: `👁️ 顯示題型 (${me.counts.reveal})`, className: "skill-purple", onClick: useReveal });
      }

      if (me.counts.freeze > 0) {
        buttons.push({ text: `⏱️ 凍結 5 秒 (${me.counts.freeze})`, className: "skill-blue", onClick: useFreeze });
      }

      if (me.counts.bomb > 0) {
        buttons.push({ text: `💣 炸彈 (${me.counts.bomb})`, className: "skill-red", onClick: useBomb });
      }

      if (me.counts.reset > 0) {
        buttons.push({ text: `🔄 重置灰格 (${me.counts.reset})`, className: "skill-red", onClick: useResetTile });
      }

      buttons.forEach(item => {
        const btn = document.createElement("button");
        btn.className = `btn skill-btn ${item.className}`;
        btn.textContent = item.text;
        btn.onclick = item.onClick;
        skillButtonsWrap.appendChild(btn);
      });
    }

    function onTileClick(index) {
      const tile = state.board[index];
      if (tile.disabled) {
        log(`格子 #${index + 1} 已不可用。`);
        return;
      }

      state.selectedTileIndex = index;

      const me = state.players.find(p => p.isMe);
      const canSeeTrueType =
        me &&
        Array.isArray(me.revealedTiles) &&
        me.revealedTiles.includes(tile.index);

      const hintText = canSeeTrueType ? tile.type : getSimpleHint(tile.type);

      tileModalContent.innerHTML = `
        格子編號：#${tile.index + 1}<br>
        題型提示：${hintText}<br>
        目前占領：${tile.owner === "green" ? "綠隊" : tile.owner === "red" ? "紅隊" : "無"}<br>
        狀態：${tile.disabled ? "不可前進" : "可挑戰"}
      `;

      previewContent.innerHTML = `
        格子編號：#${tile.index + 1}<br>
        題型提示：${hintText}<br>
        目前占領：${tile.owner === "green" ? "綠隊" : tile.owner === "red" ? "紅隊" : "無"}<br>
        狀態：${tile.disabled ? "不可前進" : "可挑戰"}
      `;

      tileModal.classList.add("show");
      renderMap();
      log(`已選擇格子 #${index + 1}`);
    }

    function getRandomQuestion() {
      const pool = QUESTIONS[state.selectedMode] || QUESTIONS.normal;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function startQuestion() {
      if (state.selectedTileIndex === null) {
        alert("請先點選一個地圖格子");
        return;
      }

      tileModal.classList.remove("show");

      state.currentQuestion = JSON.parse(JSON.stringify(getRandomQuestion()));
      state.selectedAnswer = null;

      questionText.textContent = state.currentQuestion.q;
      modalQuestionText.textContent = state.currentQuestion.q;

      optionsWrap.innerHTML = "";
      modalOptionsWrap.innerHTML = "";

      resultBox.className = "result-box";
      resultBox.textContent = "";
      modalResultBox.className = "result-box";
      modalResultBox.textContent = "";

      state.currentQuestion.options.forEach((opt, idx) => {
        const makeOption = (targetWrap) => {
          const btn = document.createElement("div");
          btn.className = "option";
          btn.textContent = `${String.fromCharCode(65 + idx)}. ${opt}`;
          btn.onclick = () => {
            state.selectedAnswer = idx;

            [...optionsWrap.children].forEach(c => c.classList.remove("selected"));
            [...modalOptionsWrap.children].forEach(c => c.classList.remove("selected"));

            if (targetWrap === optionsWrap) {
              if (optionsWrap.children[idx]) optionsWrap.children[idx].classList.add("selected");
              if (modalOptionsWrap.children[idx]) modalOptionsWrap.children[idx].classList.add("selected");
            } else {
              if (modalOptionsWrap.children[idx]) modalOptionsWrap.children[idx].classList.add("selected");
              if (optionsWrap.children[idx]) optionsWrap.children[idx].classList.add("selected");
            }
          };
          return btn;
        };

        optionsWrap.appendChild(makeOption(optionsWrap));
        modalOptionsWrap.appendChild(makeOption(modalOptionsWrap));
      });

      questionCard.classList.add("show");
      questionModal.classList.add("show");
      startTimer();
      log(`開始作答：${state.currentQuestion.type} 題`);
    }

    function startTimer() {
      clearInterval(state.timerInterval);
      state.timer = 15;
      timerText.textContent = `${state.timer} 秒`;
      modalTimerText.textContent = `${state.timer} 秒`;

      state.timerInterval = setInterval(() => {
        state.timer--;
        timerText.textContent = `${state.timer} 秒`;
        modalTimerText.textContent = `${state.timer} 秒`;

        if (state.timer <= 0) {
          clearInterval(state.timerInterval);
          handleAnswer(true);
        }
      }, 1000);
    }

    function handleAnswer(timeout = false) {
      clearInterval(state.timerInterval);
      if (!state.currentQuestion) return;

      if (timeout) {
        const msg = `時間到，答題失敗。正確答案：${state.currentQuestion.options[state.currentQuestion.answer]}。${state.currentQuestion.explain}`;
        resultBox.className = "result-box result-wrong show";
        resultBox.textContent = msg;
        modalResultBox.className = "result-box result-wrong show";
        modalResultBox.textContent = msg;
        log("答題超時，挑戰失敗。");
        disableSelectedTile();
        state.currentQuestion = null;
        return;
      }

      if (state.selectedAnswer === null) {
        alert("請先選擇答案");
        return;
      }

      const correct = state.selectedAnswer === state.currentQuestion.answer;
      const me = state.players.find(p => p.isMe);
      const tile = state.board[state.selectedTileIndex];

      if (correct) {
        const msg = `答對了！${state.currentQuestion.explain}`;
        resultBox.className = "result-box result-correct show";
        resultBox.textContent = msg;
        modalResultBox.className = "result-box result-correct show";
        modalResultBox.textContent = msg;

        me.position = tile.index;
        if (tile.owner === null) me.score += 1;
        tile.owner = "red";
        log(`答對並成功占領格子 #${tile.index + 1}`);
      } else {
        const msg = `答錯了。正確答案：${state.currentQuestion.options[state.currentQuestion.answer]}。${state.currentQuestion.explain}`;
        resultBox.className = "result-box result-wrong show";
        resultBox.textContent = msg;
        modalResultBox.className = "result-box result-wrong show";
        modalResultBox.textContent = msg;

        disableSelectedTile();
        log(`答錯，未占領格子 #${tile.index + 1}`);
      }

      state.currentQuestion = null;
      renderPlayers();
      renderMap();
      renderSkillButtons();
      checkWinner();
    }

    function disableSelectedTile() {
      if (state.selectedTileIndex === null) return;
      state.board[state.selectedTileIndex].disabled = true;
      renderMap();
    }

    function useDelete2() {
      const me = state.players.find(p => p.isMe);
      if (me.counts.delete2 <= 0) return alert("刪2次數不足");
      if (!state.currentQuestion) return alert("請先開始作答");

      const wrongIndexes = state.currentQuestion.options
        .map((_, i) => i)
        .filter(i => i !== state.currentQuestion.answer);

      const removeList = wrongIndexes.sort(() => Math.random() - 0.5).slice(0, 2);

      const applyRemove = (wrap) => {
        [...wrap.children].forEach((optEl, i) => {
          if (removeList.includes(i)) {
            optEl.style.opacity = "0.35";
            optEl.style.pointerEvents = "none";
            if (!optEl.textContent.includes("（已刪除）")) {
              optEl.textContent += "（已刪除）";
            }
          }
        });
      };

      applyRemove(optionsWrap);
      applyRemove(modalOptionsWrap);

      me.counts.delete2--;
      renderPlayers();
      renderSkillButtons();
      log("已使用技能：刪2選項");
    }

    function useResetTile() {
      const me = state.players.find(p => p.isMe);
      if (me.counts.reset <= 0) return alert("重置次數不足");

      const target = state.board.find(t => t.disabled);
      if (!target) return alert("目前沒有灰色格可重置");

      target.disabled = false;
      me.counts.reset--;
      renderPlayers();
      renderMap();
      renderSkillButtons();
      log(`已重置灰格：#${target.index + 1}`);
    }

    function useBomb() {
      const me = state.players.find(p => p.isMe);
      if (me.counts.bomb <= 0) return alert("炸彈次數不足");
      if (state.selectedTileIndex === null) return alert("請先選一個格子");

      const tile = state.board[state.selectedTileIndex];
      tile.disabled = true;
      me.counts.bomb--;
      renderPlayers();
      renderMap();
      renderSkillButtons();
      tileModal.classList.remove("show");
      log(`已對格子 #${tile.index + 1} 使用炸彈`);
    }

    function useFreeze() {
      const me = state.players.find(p => p.isMe);
      if (me.counts.freeze <= 0) return alert("凍結次數不足");

      me.counts.freeze--;
      renderPlayers();
      renderSkillButtons();
      log("已使用技能：凍結對手 5 秒");
    }

    function useOccupy() {
      const me = state.players.find(p => p.isMe);
      if (me.counts.occupy <= 0) return alert("霸佔次數不足");
      if (state.selectedTileIndex === null) return alert("請先選擇一個格子");

      const tile = state.board[state.selectedTileIndex];
      if (tile.owner !== "red") {
        tile.owner = "red";
        me.score += 1;
      }
      me.counts.occupy--;
      renderPlayers();
      renderMap();
      renderSkillButtons();
      tileModal.classList.remove("show");
      log(`已使用技能：直接霸佔格子 #${tile.index + 1}`);
    }

    function useReveal() {
      const me = state.players.find(p => p.isMe);
      if (me.counts.reveal <= 0) return alert("顯示題型次數不足");
      if (state.selectedTileIndex === null) return alert("請先點選格子");

      if (!Array.isArray(me.revealedTiles)) me.revealedTiles = [];
      if (!me.revealedTiles.includes(state.selectedTileIndex)) {
        me.revealedTiles.push(state.selectedTileIndex);
      }

      me.counts.reveal--;

      renderPlayers();
      renderMap();
      renderSkillButtons();

      const tile = state.board[state.selectedTileIndex];
      const msg = `
        格子編號：#${tile.index + 1}<br>
        題型提示：${tile.type}<br>
        先知技能已發動，可直接查看此格真正題型。
      `;
      tileModalContent.innerHTML = msg;
      previewContent.innerHTML = msg;

      log(`已使用技能：顯示格子 #${tile.index + 1} 題型`);
    }

    function resetPreview() {
      state.selectedTileIndex = null;
      previewContent.innerHTML = `請點選地圖格子後，將以彈窗方式顯示提示。`;
      questionCard.classList.remove("show");
      tileModal.classList.remove("show");
      questionModal.classList.remove("show");
      clearInterval(state.timerInterval);
      timerText.textContent = "15 秒";
      modalTimerText.textContent = "15 秒";
      renderMap();
    }

    function checkWinner() {
      const doneCount = state.board.filter(t => t.owner !== null || t.disabled).length;
      if (doneCount < state.board.length) return;

      const me = state.players.find(p => p.isMe);
      const enemy = state.players.find(p => !p.isMe);
      const winner = me.score >= enemy.score ? me : enemy;

      winnerAvatar.src = winner.avatar;
      winnerAvatar.dataset.fallbacks = JSON.stringify(winner.avatarFallbacks || [winner.avatar]);
      winnerAvatar.dataset.index = "0";
      winnerAvatar.onerror = function() { handleImgFallback(this); };

      winnerText.textContent = `${winner.nickname} 取得勝利`;
      winnerStat.textContent = `佔領格數：${winner.score}`;
      winnerModal.classList.add("show");
      log(`遊戲結束，${winner.nickname} 勝利。`);
    }

    joinBtn.addEventListener("click", () => {
      state.roomNo = document.getElementById("roomInput").value.trim() || "123";
      state.nickname = document.getElementById("nicknameInput").value.trim() || "555";
      state.mapSize = parseInt(document.getElementById("mapSizeSelect").value, 10);
      state.playerLimit = parseInt(document.getElementById("playerCountSelect").value, 10);
      state.board = createBoard(state.mapSize);
      initPlayers();
      state.gameStarted = true;

      setupScreen.classList.add("hidden");
      gameScreen.classList.add("show");

      updateTopChips();
      renderPlayers();
      renderMap();
      renderSkillButtons();

      systemLog.textContent = "";
      log(`遊戲開始，題庫模式：${getModeName(state.selectedMode)}`);
      log(`${state.nickname} 選擇角色：${getRoleById(state.selectedRoleId).name}`);
      log("成功加入房間");
    });

    document.getElementById("confirmChallengeBtn").addEventListener("click", startQuestion);
    document.getElementById("cancelPreviewBtn").addEventListener("click", resetPreview);
    submitAnswerBtn.addEventListener("click", () => handleAnswer(false));

    tileModalCancelBtn.addEventListener("click", () => {
      tileModal.classList.remove("show");
    });

    tileModalConfirmBtn.addEventListener("click", () => {
      startQuestion();
    });

    modalCloseBtn.addEventListener("click", () => {
      questionModal.classList.remove("show");
      clearInterval(state.timerInterval);
    });

    modalSubmitBtn.addEventListener("click", () => {
      handleAnswer(false);
    });

    document.getElementById("closeWinnerBtn").addEventListener("click", () => {
      winnerModal.classList.remove("show");
    });

    renderModes();
    renderRoles();
  </script>
</body>
</html>
