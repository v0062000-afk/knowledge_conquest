<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>知識爭奪戰</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    text-align: center;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.hidden { display:none; }

input, select, button {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
}

/* 角色卡片 */
.character-list {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.character-card {
    width: 120px;
    background: #2c2c44;
    margin: 8px;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
}

.character-card img {
    width: 80px;
}

.character-card.selected {
    border: 2px solid yellow;
}

.character-card.disabled {
    opacity: 0.3;
    pointer-events: none;
}

/* 遊戲區 */
.game-area {
    display: flex;
    justify-content: center;
}

.grid {
    display: grid;
    gap: 4px;
}

.cell {
    width: 60px;
    height: 60px;
    background: #444;
    border-radius: 6px;
    position: relative;
    cursor: pointer;
}

.cell.blocked {
    background: gray;
}

.player-img {
    width: 40px;
    position: absolute;
    top: 10px;
    left: 10px;
}

/* 技能 */
.skill-panel {
    margin-left: 20px;
    width: 180px;
}

.skill-btn {
    width: 100%;
    margin: 5px 0;
}

/* 結算彈窗 */
#resultModal {
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

#resultBox {
    background:#222;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>知識爭奪戰</h1>

<!-- Lobby -->
<div id="lobby">

<input id="room" placeholder="房間號">
<input id="nickname" placeholder="你的暱稱">

<br>

<select id="board">
<option value="3">3x3</option>
<option value="4">4x4</option>
<option value="5">5x5</option>
<option value="6">6x6</option>
</select>

<select id="players">
<option value="2">2人</option>
<option value="3">3人</option>
<option value="4">4人</option>
</select>

<br>

<select id="difficulty">
<option value="normal">普通題型</option>
<option value="hard">困難題型</option>
<option value="extreme">超級難題型</option>
<option value="mixed">綜合題型</option>
</select>

<h3>選擇角色</h3>
<div class="character-list" id="characters"></div>

<button onclick="join()">加入房間</button>

</div>

<!-- Game -->
<div id="game" class="hidden">

<h3 id="info"></h3>

<div class="game-area">
<div id="grid" class="grid"></div>

<div class="skill-panel">
<h4>技能</h4>
<button class="skill-btn" onclick="useSkill('remove')">刪2選項</button>
<button class="skill-btn" onclick="useSkill('reset')">重置灰格</button>
<button class="skill-btn" onclick="useSkill('occupy')">霸佔</button>
<button class="skill-btn" onclick="useSkill('freeze')">時間凍結</button>
<button class="skill-btn" onclick="useSkill('bomb')">炸彈</button>
</div>
</div>

</div>

<!-- 結算 -->
<div id="resultModal">
<div id="resultBox">
<h2>遊戲結果</h2>
<div id="resultContent"></div>
<button onclick="location.reload()">重新開始</button>
</div>
</div>

<script>
const socket = io();
let myId = "";
let selectedChar = "";
let roomId = "";

const charDefs = {
    scholar: "學霸",
    landlord: "地主",
    seer: "先知",
    time_master: "時間大師",
    bomber: "炸彈怪客"
};

/* 角色卡 */
function renderCharacters(chosen=[]) {
    const box = document.getElementById("characters");
    box.innerHTML = "";

    Object.keys(charDefs).forEach(key=>{
        const div = document.createElement("div");
        div.className = "character-card";

        if(chosen.includes(key)) div.classList.add("disabled");
        if(selectedChar===key) div.classList.add("selected");

        div.innerHTML = `
        <img src="/static/characters/${key}.png">
        <div>${charDefs[key]}</div>
        `;

        div.onclick=()=>{
            if(chosen.includes(key)) return;
            selectedChar=key;
            renderCharacters(chosen);
        };

        box.appendChild(div);
    });
}

/* 加入 */
function join(){
    roomId = document.getElementById("room").value;

    socket.emit("join",{
        room:roomId,
        nickname:document.getElementById("nickname").value,
        character:selectedChar,
        board_size:document.getElementById("board").value,
        max_players:document.getElementById("players").value,
        difficulty_mode:document.getElementById("difficulty").value
    });
}

/* 畫地圖 */
function drawGrid(data){
    const grid = document.getElementById("grid");
    grid.style.gridTemplateColumns=`repeat(${data.board_size},60px)`;
    grid.innerHTML="";

    data.grid.forEach((row,i)=>{
        row.forEach((cell,j)=>{
            const div=document.createElement("div");
            div.className="cell";

            if(cell.status==="blocked") div.classList.add("blocked");

            if(cell.owner){
                const img=document.createElement("img");
                img.src=data.players[cell.owner].character_image;
                img.className="player-img";
                div.appendChild(img);
            }

            div.onclick=()=>{
                socket.emit("preview_cell",{room:data.room,x:i,y:j});
            };

            grid.appendChild(div);
        });
    });
}

/* socket */
socket.on("joined",(d)=>{
    myId=d.sid;
    document.getElementById("lobby").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
});

socket.on("room_state",(data)=>{
    renderCharacters(data.chosen_characters);
    drawGrid(data);
});

/* 結算 */
socket.on("game_over",(data)=>{
    const modal=document.getElementById("resultModal");
    const box=document.getElementById("resultContent");

    box.innerHTML="";

    data.ranking.forEach(p=>{
        box.innerHTML+=`
        <div>
        <img src="${p.character_image}" width="50">
        ${p.name}：<b>${p.count}</b>
        </div>
        `;
    });

    modal.style.display="flex";
});

/* 技能 */
function useSkill(type){
    if(type==="remove") socket.emit("use_remove_two",{room:roomId});
    if(type==="reset") socket.emit("use_reset_block",{room:roomId});
    if(type==="occupy") socket.emit("use_force_occupy",{room:roomId});
    if(type==="freeze") socket.emit("use_freeze_time",{room:roomId});
    if(type==="bomb") socket.emit("use_bomb_cell",{room:roomId});
}
</script>

</body>
</html>
